function todayStr(){
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function isWeekend(dateStr){
  const d = new Date(dateStr+'T00:00:00');
  const day = d.getDay();
  return day===0 || day===6;
}
function fmtDate(dateStr){
  const d = new Date(dateStr+'T00:00:00');

}

/* ============ STORAGE (local, offline — IndexedDB with localStorage fallback) ============ */
const DB_NAME = 'omad-ledger-db';
const STORE = 'kv';
let dbPromise = null;
function openDB(){
  if(dbPromise) return dbPromise;
  dbPromise = new Promise((resolve,reject)=>{
    if(!('indexedDB' in window)){ resolve(null); return; }
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = ()=>{ req.result.createObjectStore(STORE); };
    req.onsuccess = ()=> resolve(req.result);
    req.onerror = ()=> resolve(null);
  });
  return dbPromise;
}
async function idbGet(key){
  const db = await openDB();
  if(!db) return localStorage.getItem(key);
  return new Promise((resolve)=>{
    const tx = db.transaction(STORE,'readonly');
    const req = tx.objectStore(STORE).get(key);
    req.onsuccess = ()=> resolve(req.result ?? null);
    req.onerror = ()=> resolve(null);
  });
}
async function idbSet(key, value){
  const db = await openDB();
  if(!db){ localStorage.setItem(key, value); return true; }
  return new Promise((resolve)=>{
    const tx = db.transaction(STORE,'readwrite');
    tx.objectStore(STORE).put(value, key);
    tx.oncomplete = ()=> resolve(true);
    tx.onerror = ()=> resolve(false);
  });
}
async function loadAll(){
  try{
    const s = await idbGet('settings');
    if(s) settings = {...DEFAULT_SETTINGS, ...JSON.parse(s)};
  }catch(e){ /* no settings yet */ }
  try{
    const w = await idbGet('weight-log');
    if(w) weightLog = JSON.parse(w);
  }catch(e){ weightLog = []; }
  try{
    const d = await idbGet('daily-logs');
    if(d) dailyLogs = JSON.parse(d);
  }catch(e){ dailyLogs = {}; }
  try{
    const cf = await idbGet('custom-foods');
    if(cf) customFoods = JSON.parse(cf);
  }catch(e){ customFoods = []; }

  const t = dailyLogs[todayStr()];
  if(t && t.meals) currentMeal = t.meals;
}

function getToday(){
  if(!dailyLogs[todayStr()]){
    dailyLogs[todayStr()] = {
      weight:null, waist:null, water:0, exercise:[], notes:'', meals:[],
      eatStart:null, eatEnd:null, steps:null, activityLevel:null
    };
  }
  const t = dailyLogs[todayStr()];
  if(t.eatStart===undefined) t.eatStart=null;
  if(t.eatEnd===undefined) t.eatEnd=null;
  if(t.steps===undefined) t.steps=null;
  if(t.activityLevel===undefined) t.activityLevel=null;
  return t;
}
function lastEatEnd(){
  const dates = Object.keys(dailyLogs).sort();
  for(let i=dates.length-1;i>=0;i--){
    const d = dailyLogs[dates[i]];
    if(d && d.eatEnd) return {date:dates[i], time:d.eatEnd};
  }
  return null;
}
function fastingStatus(){
  const today = getToday();
  const now = new Date();
  if(today.eatStart && !today.eatEnd){
    const start = new Date(today.eatStart);
    const mins = Math.round((now-start)/60000);
    return {state:'eating', minutes:mins};
  }
  const last = lastEatEnd();
  if(!last) return {state:'unknown', hours:0};
  const start = new Date(last.time);
  const hours = (now-start)/3600000;
  return {state:'fasting', hours: hours};
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1800);
}

/* ============ DERIVED DATA ============ */
function currentWeight(){
  if(weightLog.length===0) return settings.startWeight;
  return weightLog[weightLog.length-1].weight;
}
function currentWaist(){
  const w = [...weightLog].reverse().find(e=>e.waist);
  return w ? w.waist : settings.startWaist;
}
function streakDays(){
  let n=0;
  let d = new Date();
  while(true){
    const key = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    const log = dailyLogs[key];
    if(log && (log.meals.length>0 || log.weight)){ n++; d.setDate(d.getDate()-1); }
    else break;
  }
  return n;
}
function mealTotals(meal){
  return meal.reduce((acc,item)=>{
    const f = allFoods().find(x=>x.id===item.foodId);
    if(!f) return acc;
    acc.cal += f.cal*item.qty;
    acc.protein += f.protein*item.qty;
    acc.carbs += f.carbs*item.qty;
    acc.fat += f.fat*item.qty;
    acc.fiber += f.fiber*item.qty;
    return acc;
  },{cal:0,protein:0,carbs:0,fat:0,fiber:0});
}

function fastRing(pct, big, label, sub){
  const r = big?38:32, size=big?92:80, c=2*Math.PI*r, cx=size/2, cy=size/2;
  const off = c - Math.min(1,Math.max(0,pct))*c;
  return `<div class="ring-wrap" style="width:${size}px;height:${size}px;">
    <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
      <circle class="ring-bg" cx="${cx}" cy="${cy}" r="${r}"/>
      <circle class="ring-fg" cx="${cx}" cy="${cy}" r="${r}" stroke-dasharray="${c}" stroke-dashoffset="${off}"/>
    </svg>
    <div class="ring-label"><div class="rv">${label}</div><div class="rl">${sub}</div></div>
  </div>`;
}

/* ============ RENDER: MENU GENERATOR ============ */
function scoreFoodCombo(combo, calTarget, proteinTarget){
  const t = mealTotals(combo);
  const calDiff = Math.abs(t.cal - calTarget);
  const proteinDiff = Math.max(0, proteinTarget - t.protein);
  const overshoot = Math.max(0, t.cal - calTarget*1.15) * 3;
  return calDiff + proteinDiff*4 + overshoot;
}
function generateMenu(){
  const wknd = isWeekend(todayStr());
  let pool = FOODS.filter(f=>{
    if(f.tags.includes('chicken')) return menuFilters.chicken && wknd;
    if(f.tags.includes('fish')) return menuFilters.fish;
    if(f.tags.includes('tofu')) return menuFilters.tofu || menuFilters.veg;
    if(f.tags.includes('egg')) return menuFilters.egg;
    return menuFilters.veg;
  });
  if(pool.length===0) pool = FOODS.filter(f=>f.tags.includes('veg'));

  let best = null, bestScore = Infinity;
  for(let attempt=0; attempt<40; attempt++){
    const shuffled = [...pool].sort(()=>Math.random()-0.5);
    let combo = [];
    let cal=0, protein=0;
    for(const f of shuffled){
      if(combo.length>=5) break;
      const qty = 1;
      if(cal + f.cal*qty <= settings.calorieTarget*1.08){
        combo.push({foodId:f.id, qty});
        cal += f.cal*qty;
        protein += f.protein*qty;
      }
      if(cal >= settings.calorieTarget*0.85 && protein >= settings.proteinTarget*0.85) break;
    }
    const s = scoreFoodCombo(combo, settings.calorieTarget, settings.proteinTarget);
    if(s < bestScore){ bestScore = s; best = combo; }
  }
  lastMenu = best;
  render();
}

  saveDailyLogs();
  showToast('Steps saved');
  render();
}
function removeMealItem(idx){
  const today = getToday();
  today.meals.splice(idx,1);
  saveDailyLogs();
  render();
}
function addWater(amt){
  const today = getToday();
  today.water = Math.max(0, round1(today.water + amt));
  saveDailyLogs();
  render();
}
function toggleExercise(ex){
  const today = getToday();
  if(today.exercise.includes(ex)) today.exercise = today.exercise.filter(e=>e!==ex);
  else today.exercise.push(ex);
  saveDailyLogs();
  render();
}
async function saveToday(){
  const today = getToday();
  const w = document.getElementById('weight-input').value;
  const wa = document.getElementById('waist-input').value;
  const notes = document.getElementById('notes-input').value;
  today.notes = notes;
  if(w){
    today.weight = parseFloat(w);
    const idx = weightLog.findIndex(e=>e.date===todayStr());
    const entry = {date:todayStr(), weight:parseFloat(w), waist: wa? parseFloat(wa): (weightLog[idx]?.waist||null)};
    if(idx>=0) weightLog[idx]=entry; else weightLog.push(entry);
  } else if(wa){
    today.waist = parseFloat(wa);
    const idx = weightLog.findIndex(e=>e.date===todayStr());
    if(idx>=0) weightLog[idx].waist = parseFloat(wa);
  }
  weightLog.sort((a,b)=>a.date.localeCompare(b.date));
  await saveDailyLogs();
  await saveWeightLog();
  showToast('Today saved to the ledger');
  render();
}

/* ============ RENDER: FOODS LIBRARY ============ */

  const filtered = allFoods().filter(f=>!foodSearch || f.name.toLowerCase().includes(foodSearch.toLowerCase()));
  return `
  <div class="card">
    <div class="row">

  await saveCustomFoods();
  showToast('Custom food removed');
  render();
}

/* ============ RENDER: PROGRESS ============ */
function lineChartSvg(points, color, unitSuffix){
  if(points.length<2){
    return `<div class="empty">Log a couple more entries to see this trend.</div>`;
  }
  const w = 320, h=140, pad=24;
  const vals = points.map(p=>p.v);
  const minV = Math.min(...vals)-1, maxV = Math.max(...vals)+1;
  const pts = points.map((p,i)=>{
    const x = pad + (i/(points.length-1))*(w-2*pad);
    const y = h-pad - ((p.v-minV)/(maxV-minV||1))*(h-2*pad);
    return [x,y];
  });
  const path = pts.map((p,i)=>(i===0?'M':'L')+p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
  const dots = pts.map(p=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="3" fill="${color}"/>`).join('');
  const first = points[0].v, last = points[points.length-1].v;
  return `<svg class="chart" viewBox="0 0 ${w} ${h}">
    <path d="${path}" fill="none" stroke="${color}" stroke-width="2"/>
    ${dots}
  </svg>
  <div class="row small"><span>${first}${unitSuffix}</span><span>${last}${unitSuffix}</span></div>`;
}
function barChartSvg(points, color, unit){
  if(points.length===0){
    return `<div class="empty">No entries yet.</div>`;
  }
  const w = 320, h=110, pad=10, gap=4;
  const vals = points.map(p=>p.v);
  const maxV = Math.max(...vals, 1);
  const bw = (w-2*pad)/points.length - gap;
  const bars = points.map((p,i)=>{
    const bh = (p.v/maxV)*(h-2*pad);
    const x = pad + i*((w-2*pad)/points.length);
    const y = h-pad-bh;
    return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${bh.toFixed(1)}" rx="2" fill="${color}"/>`;
  }).join('');
  return `<svg class="chart" viewBox="0 0 ${w} ${h}">${bars}</svg>
  <div class="row small"><span>Avg ${Math.round(vals.reduce((a,b)=>a+b,0)/vals.length)} ${unit}</span><span>Best ${maxV} ${unit}</span></div>`;
}
function estFatLossKg(w){
  return round1((settings.startWeight - w) * 0.85);
}
function renderProgress(){
  const cw = currentWeight();

  const weightPts = weightLog.filter(e=>e.weight).map(e=>({v:e.weight}));
  const waistPts = weightLog.filter(e=>e.waist).map(e=>({v:e.waist}));
  const fatPts = weightLog.filter(e=>e.weight).map(e=>({v:estFatLossKg(e.weight)}));
  const stepsDates = Object.keys(dailyLogs).sort().slice(-14).filter(d=>dailyLogs[d].steps);
  const stepsPts = stepsDates.map(d=>({v:dailyLogs[d].steps}));

  return `
  <div class="card">
    <div class="card-label">Weight trend (kg)</div>
    ${lineChartSvg(weightPts, 'var(--turmeric)', 'kg')}
  </div>
  <div class="card">
    <div class="card-label">Waist trend (cm)</div>
    ${lineChartSvg(waistPts, 'var(--sage-dark)', 'cm')}
  </div>
  <div class="card">
    <div class="card-label">Estimated fat lost (kg)</div>
    ${lineChartSvg(fatPts, 'var(--rust)', 'kg')}
    <div class="small" style="margin-top:6px;">Rough estimate assuming about 85% of weight lost is fat — not a clinical measurement.</div>
  </div>
  <div class="card">
    <div class="card-label">Steps — last 14 logged days</div>
    ${barChartSvg(stepsPts, 'var(--sage)', 'steps')}
  </div>
  <div class="card">
    <div class="card-label">Milestones</div>
    <div class="stamp-grid">
      ${MILESTONES.map(m=>{
        const reached = cw<=m;
        return `<div class="stamp ${reached?'':'locked'}"><div class="sv">${m}</div><div class="sl">kg</div></div>`;
      }).join('')}
    </div>
  </div>
  <div class="card">
    <div class="card-label">Entries</div>
    ${weightLog.length===0 ? '<div class="empty">No entries yet.</div>' :
      [...weightLog].reverse().slice(0,20).map(e=>`
        <div class="food-item">
          <div class="fi-name">${fmtDate(e.date)}</div>
          <div class="fi-sub num">${e.weight?e.weight+' kg':'—'} ${e.waist?' · '+e.waist+' cm':''}</div>
        </div>
      `).join('')}
  </div>
  `;
}

/* ============ RENDER: SETTINGS ============ */
function renderSettings(){
  return `
  <div class="card" id="install-card" style="${deferredPrompt ? '' : 'display:none;'}">
    <div class="card-label">Install</div>
    <div class="small" style="margin-bottom:8px;">Install OMAD Ledger as a standalone app on this device.</div>
    <button class="btn accent block" onclick="triggerInstall()">Install app</button>
  </div>
  <div class="card">
    <div class="card-label">Your plan</div>
    <label class="field-label">Height (cm)</label>
    <input type="number" id="s-height" value="${settings.heightCm||''}">
    <label class="field-label">Starting weight (kg)</label>
    <input type="number" step="0.1" id="s-startweight" value="${settings.startWeight}">
    <label class="field-label">Starting waist (cm)</label>
    <input type="number" step="0.5" id="s-startwaist" value="${settings.startWaist}">
    <label class="field-label">Goal weight (kg)</label>
    <input type="number" step="0.5" id="s-goalweight" value="${settings.goalWeight}">
    <label class="field-label">Daily water goal (L)</label>
    <input type="number" step="0.5" id="s-water" value="${settings.waterGoalL}">
    <label class="field-label">Target eating window (hours)</label>
    <input type="number" step="0.5" id="s-eatwindow" value="${settings.targetEatingWindowHrs}">
    <label class="field-label">Daily step goal</label>
    <input type="number" step="500" id="s-steps" value="${settings.stepGoal}">
    <button class="btn accent block" style="margin-top:12px;" onclick="saveSettingsForm()">Save settings</button>
  </div>
  <div class="card">
    <div class="card-label">About this ledger</div>
    <div style="font-size:12.5px;color:var(--ink-soft);line-height:1.6;">
      Everything you log stays on this device, tied to your account here in Claude. Add this page to your home screen for one-tap access — open it in your phone browser, then use "Add to Home Screen" from the browser menu.
    </div>
  </div>
  `;
}
function saveSettingsForm(){
  settings.heightCm = parseFloat(document.getElementById('s-height').value)||null;
  settings.startWeight = parseFloat(document.getElementById('s-startweight').value)||settings.startWeight;
  settings.startWaist = parseFloat(document.getElementById('s-startwaist').value)||settings.startWaist;
  settings.goalWeight = parseFloat(document.getElementById('s-goalweight').value)||settings.goalWeight;
  settings.waterGoalL = parseFloat(document.getElementById('s-water').value)||settings.waterGoalL;
  settings.targetEatingWindowHrs = parseFloat(document.getElementById('s-eatwindow').value)||settings.targetEatingWindowHrs;
  settings.stepGoal = parseInt(document.getElementById('s-steps').value)||settings.stepGoal;
  saveSettings();
  showToast('Settings saved');
  render();
}

/* ============ MAIN RENDER ============ */
function render(){
  const root = document.getElementById('root');
  document.getElementById('header-date').textContent = new Date().toLocaleDateString('en-IN',{weekday:'long', day:'numeric', month:'long'});
  let html = '';
  if(currentTab==='home') html = renderHome();
  else if(currentTab==='menu') html = renderMenu();
  else if(currentTab==='today') html = renderToday();
  else if(currentTab==='foods') html = renderFoods();
  else if(currentTab==='progress') html = renderProgress();
  else if(currentTab==='settings') html = renderSettings();
  root.innerHTML = `<div class="screen active">${html}</div>`;
}
function switchTab(tab){
  currentTab = tab;
  foodSearch = '';
  document.querySelectorAll('nav.tabbar button').forEach(b=>{
    b.classList.toggle('active', b.dataset.tab===tab);
  });
  render();
}

/* ============ INIT ============ */
document.querySelectorAll('nav.tabbar button').forEach(b=>{
  b.addEventListener('click', ()=>switchTab(b.dataset.tab));
});
document.getElementById('theme-toggle').addEventListener('click', ()=>{
  settings.darkMode = !settings.darkMode;
  document.documentElement.setAttribute('data-theme', settings.darkMode?'dark':'light');
  saveSettings();
});

(async function init(){
  await loadAll();
  document.documentElement.setAttribute('data-theme', settings.darkMode?'dark':'light');
  render();
  setInterval(()=>{
    if(currentTab==='home' || currentTab==='today') render();
  }, 60000);
})();

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}

let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', (e)=>{
  e.preventDefault();
  deferredPrompt = e;
  if(currentTab==='settings') render();
});
async function triggerInstall(){
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt = null;
  render();
}
</script>
