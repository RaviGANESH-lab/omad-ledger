<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>OMAD Ledger</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="OMAD Ledger">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#F3ECD8">
<link rel="manifest" href="manifest.json">

<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F3ECD8; --paper-2:#EAE1C6; --ink:#24312A; --ink-soft:#4A574E;
    --line:#C7BA96; --turmeric:#D89A2E; --turmeric-dark:#8C5F16;
    --rust:#A8452B; --rust-dark:#6E2C1B; --sage:#6E8C6C; --sage-dark:#3F5A3D;
    --card:#FBF8EE; --radius:10px;
  }
  [data-theme="dark"]{
    --paper:#1B211C; --paper-2:#232B24; --ink:#EDE7D4; --ink-soft:#B9C0B4;
    --line:#3B4438; --card:#212820; --turmeric:#E8B24F; --turmeric-dark:#F3CE8C;
    --rust:#D97052; --rust-dark:#F0A78E; --sage:#8FB48C; --sage-dark:#B9D4B6;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:linear-gradient(160deg, #FCF6E6 0%, #F3ECD8 45%, #ECDFB8 100%);background-attachment:fixed;color:var(--ink);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;padding-bottom:78px;min-height:100vh;}
  .app{max-width:480px;margin:0 auto;padding:0 14px;}
  h1,h2,h3{font-family:'Fraunces',serif;font-weight:600;margin:0;}
  .num{font-family:'JetBrains Mono',monospace;}
  header.top{position:sticky;top:0;z-index:20;background:linear-gradient(180deg, #FCF6E6 0%, #F3ECD8 100%);padding:16px 14px 10px;border-bottom:1px solid var(--line);box-shadow:0 2px 10px rgba(36,49,42,0.05);display:flex;align-items:center;justify-content:space-between;}
  header.top::after{content:'';position:absolute;left:0;right:0;bottom:-1px;height:3px;background:linear-gradient(90deg, var(--turmeric), var(--rust), var(--sage));opacity:0.8;}
  header.top .brand{display:flex;align-items:center;gap:8px;}
  header.top .brand .stamp-mini{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--rust);display:flex;align-items:center;justify-content:center;color:var(--rust);font-size:16px;transform:rotate(-8deg);}
  header.top h1{font-size:19px;letter-spacing:0.2px;}
  header.top .date{font-size:11px;color:var(--ink-soft);font-family:'JetBrains Mono',monospace;}
  .theme-btn{background:none;border:1px solid var(--line);border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;color:var(--ink);cursor:pointer;font-size:16px;}
  .screen{display:none;padding-top:14px;}
  .screen.active{display:block;animation:fadein 0.15s ease;}
  @keyframes fadein{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:12px;position:relative;box-shadow:0 1px 3px rgba(36,49,42,0.06), 0 4px 14px rgba(36,49,42,0.045);}
  .card-label{font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--ink-soft);margin-bottom:6px;font-weight:600;}
  .stub{border-left:3px solid var(--turmeric);}
  .stub.rust{border-left-color:var(--rust);}
  .stub.sage{border-left-color:var(--sage);}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .metric{background:var(--paper-2);border-radius:10px;padding:10px 12px;}
  .metric .v{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;}
  .metric .l{font-size:11px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:0.05em;margin-top:2px;}
  .metric .d{font-size:11px;margin-top:3px;color:var(--sage-dark);}
  .bar-track{background:var(--paper-2);border-radius:6px;height:9px;overflow:hidden;margin-top:6px;}
  .bar-fill{height:100%;background:linear-gradient(90deg, #EBBB63, var(--turmeric));border-radius:6px;transition:width 0.4s ease;}
  .bar-fill.rust{background:linear-gradient(90deg, #C7573A, var(--rust));} .bar-fill.sage{background:linear-gradient(90deg, #8CAE89, var(--sage));}
  .bar-row{margin-bottom:10px;}
  .bar-row .top-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px;}
  .bar-row .top-row .name{color:var(--ink-soft);}
  .bar-row .top-row .amt{font-family:'JetBrains Mono',monospace;font-weight:600;}
  button, select, input{font-family:'Inter',sans-serif;}
  .btn{background:linear-gradient(135deg, #34473B, var(--ink));color:var(--paper);border:none;border-radius:9px;padding:10px 16px;font-size:13px;font-weight:500;cursor:pointer;box-shadow:0 2px 6px rgba(36,49,42,0.18);transition:transform 0.12s ease, box-shadow 0.12s ease;}
  .btn:active{transform:scale(0.98);}
  .btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--line);}
  .btn.accent{background:linear-gradient(135deg, #EBBB63, var(--turmeric));color:#2A1D08;box-shadow:0 2px 8px rgba(216,154,46,0.35);}
  .btn.rust{background:linear-gradient(135deg, #C7573A, var(--rust));color:#FBF0EA;box-shadow:0 2px 8px rgba(168,69,43,0.35);}
  .btn.block{width:100%;}
  .btn.sm{padding:6px 10px;font-size:12px;border-radius:6px;}
  .btn:disabled{opacity:0.4;cursor:not-allowed;}
  .chip-row{display:flex;flex-wrap:wrap;gap:7px;}
  .chip{border:1px solid var(--line);border-radius:20px;padding:6px 12px;font-size:12px;cursor:pointer;background:var(--paper-2);color:var(--ink-soft);}
  .chip.active{background:var(--turmeric);border-color:var(--turmeric);color:#2A1D08;font-weight:600;}
  input[type=number], input[type=text], input[type=date], input[type=time], select, textarea{width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:8px;background:var(--paper-2);color:var(--ink);font-size:14px;}
  textarea{resize:vertical;min-height:50px;}
  label.field-label{font-size:11px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:0.05em;display:block;margin-bottom:4px;margin-top:10px;}
  .food-item{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--line);}
  .food-item:last-child{border-bottom:none;}
  .food-item .fi-name{font-size:13.5px;font-weight:500;}
  .food-item .fi-sub{font-size:11px;color:var(--ink-soft);font-family:'JetBrains Mono',monospace;}
  .food-item .fi-tag{font-size:9px;text-transform:uppercase;padding:1px 6px;border-radius:8px;background:var(--paper-2);color:var(--ink-soft);margin-left:4px;}
  .fi-actions{display:flex;gap:6px;flex-shrink:0;}
  .qty-ctrl{display:flex;align-items:center;gap:6px;flex-shrink:0;}
  .qty-ctrl button{width:24px;height:24px;border-radius:50%;border:1px solid var(--line);background:var(--paper-2);color:var(--ink);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .qty-ctrl .q{font-family:'JetBrains Mono',monospace;min-width:16px;text-align:center;font-size:13px;}
  .stamp{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;width:62px;height:62px;border-radius:16px;border:2px solid var(--rust);color:var(--rust-dark);font-size:20px;margin:4px;background:linear-gradient(150deg, #FBEBC8, #F4D48F);box-shadow:0 2px 8px rgba(216,154,46,0.28);}
  .stamp.locked{border-color:var(--line);color:var(--ink-soft);opacity:0.45;background:var(--card);box-shadow:none;}
  .stamp .sl{font-size:8px;text-transform:uppercase;letter-spacing:0.02em;margin-top:2px;}
  .stamp-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:2px;}
  nav.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:30;background:var(--card);border-top:1px solid var(--line);display:flex;justify-content:space-around;padding:6px 4px 8px;max-width:480px;margin:0 auto;}
  nav.tabbar button{background:none;border:none;color:var(--ink-soft);display:flex;flex-direction:column;align-items:center;gap:2px;font-size:9.5px;padding:4px 8px;cursor:pointer;text-transform:uppercase;letter-spacing:0.03em;}
  nav.tabbar button .ic{font-size:17px;}
  nav.tabbar button.active{color:var(--rust);font-weight:600;}
  nav.tabbar button.locked{opacity:0.35;}
  .empty{text-align:center;padding:24px 10px;color:var(--ink-soft);font-size:13px;}
  .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--paper);padding:9px 18px;border-radius:20px;font-size:12.5px;z-index:50;opacity:0;transition:opacity 0.25s;pointer-events:none;max-width:88%;text-align:center;}
  .toast.show{opacity:1;}
  .row{display:flex;justify-content:space-between;align-items:center;gap:8px;}
  .small{font-size:11px;color:var(--ink-soft);}
  .divider{height:1px;background:var(--line);margin:12px 0;}
  svg.chart{width:100%;height:150px;display:block;}
  .menu-card{background:var(--paper-2);border-radius:10px;padding:12px;margin-top:10px;}
  .warn{background:var(--paper-2);border-left:3px solid var(--rust);border-radius:6px;padding:8px 10px;font-size:12px;color:var(--rust-dark);margin-top:8px;}
  .note{background:var(--paper-2);border-radius:8px;padding:8px 10px;font-size:12px;color:var(--ink-soft);margin-top:8px;line-height:1.5;}
  .loading{text-align:center;padding:60px 20px;color:var(--ink-soft);font-family:'JetBrains Mono',monospace;font-size:12px;}
  .fast-ring{display:flex;align-items:center;gap:16px;}
  .ring-wrap{position:relative;flex-shrink:0;}
  .ring-wrap svg{transform:rotate(-90deg);}
  .ring-bg{fill:none;stroke:var(--paper-2);stroke-width:8;}
  .ring-fg{fill:none;stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset 0.4s ease;}
  .ring-label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .ring-label .rv{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:14px;}
  .ring-label .rl{font-size:8px;color:var(--ink-soft);text-transform:uppercase;}
  .clock{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink-soft);}
  .time-row{display:flex;gap:8px;} .time-row > *{flex:1;}
  .custom-food-form{background:var(--paper-2);border-radius:10px;padding:12px;margin-top:8px;}
  .form-grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
  .form-grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .milestone-track{position:relative;height:8px;background:var(--paper-2);border-radius:6px;margin:18px 0 10px;}
  .milestone-track .fill{position:absolute;top:0;left:0;height:100%;background:var(--turmeric);border-radius:6px;}
  .milestone-track .tick{position:absolute;top:-14px;transform:translateX(-50%);font-size:10px;color:var(--ink-soft);font-family:'JetBrains Mono',monospace;white-space:nowrap;}
  .milestone-track .tickmark{position:absolute;top:0;width:2px;height:8px;background:var(--card);}
  .milestone-track .dot{position:absolute;top:-4px;width:16px;height:16px;border-radius:50%;background:var(--rust);border:2px solid var(--card);transform:translateX(-50%);}
  .est-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--line);font-size:12.5px;}
  .est-row:last-child{border-bottom:none;}
  .gate-overlay{text-align:center;padding:30px 16px;}
  .lock-icon{font-size:30px;margin-bottom:8px;}
  .about-list{font-size:12.5px;line-height:1.9;color:var(--ink-soft);}

  .screen.active{animation:none;}
  .screen.slide-left{animation:slideLeft 0.22s ease;}
  .screen.slide-right{animation:slideRight 0.22s ease;}
  @keyframes slideLeft{from{opacity:0;transform:translateX(18px);}to{opacity:1;transform:translateX(0);}}
  @keyframes slideRight{from{opacity:0;transform:translateX(-18px);}to{opacity:1;transform:translateX(0);}}

  .ticker-wrap{overflow:hidden;white-space:nowrap;background:var(--paper-2);border:1px solid var(--line);border-radius:20px;padding:7px 0;margin-bottom:12px;position:relative;}
  .ticker-track{display:inline-block;padding-left:100%;animation:tickerScroll 22s linear infinite;font-size:12px;color:var(--ink-soft);}
  .ticker-track span{margin-right:38px;}
  .ticker-track span.hl{color:var(--rust-dark);font-weight:600;}
  @keyframes tickerScroll{from{transform:translateX(0);}to{transform:translateX(-100%);}}

  .badge-pop{position:fixed;top:16px;left:50%;transform:translateX(-50%) scale(0.8);z-index:60;background:var(--card);border:2px solid var(--turmeric);border-radius:14px;padding:10px 18px;display:flex;align-items:center;gap:10px;box-shadow:0 6px 18px rgba(0,0,0,0.18);opacity:0;pointer-events:none;}
  .badge-pop.show{animation:badgePop 2.6s ease forwards;}
  .badge-pop .bp-icon{font-size:26px;}
  .badge-pop .bp-text{font-size:12.5px;}
  .badge-pop .bp-text b{display:block;font-family:'Fraunces',serif;font-size:14px;color:var(--rust-dark);}
  @keyframes badgePop{
    0%{opacity:0;transform:translateX(-50%) scale(0.7) translateY(-10px);}
    12%{opacity:1;transform:translateX(-50%) scale(1.05) translateY(0);}
    18%{transform:translateX(-50%) scale(1) translateY(0);}
    85%{opacity:1;}
    100%{opacity:0;transform:translateX(-50%) scale(0.95) translateY(-6px);}
  }
  .stamp{transition:opacity 0.4s ease, transform 0.3s ease;}
  .stamp.newly{animation:stampCelebrate 0.6s ease;}
  @keyframes stampCelebrate{0%{transform:scale(0.7) rotate(-8deg);}60%{transform:scale(1.15) rotate(4deg);}100%{transform:scale(1) rotate(0);}}
  .bar-fill{transition:width 0.5s cubic-bezier(.4,0,.2,1);}
  .ring-fg{transition:stroke-dashoffset 0.6s cubic-bezier(.4,0,.2,1);}
[data-theme="dark"] body{background:linear-gradient(160deg, #232A23 0%, #1B211C 45%, #161A16 100%);}
[data-theme="dark"] header.top{background:linear-gradient(180deg, #232A23 0%, #1B211C 100%);}
[data-theme="dark"] .stamp{background:linear-gradient(150deg, #3A3220, #4A3A1A);}
</style>
</head>

<div class="badge-pop" id="badge-pop"></div>

/* ============ STORAGE (local, offline) ============ */
const DB_NAME='omad-ledger-db', STORE='kv';
let dbPromise=null;
function openDB(){
  if(dbPromise) return dbPromise;
  dbPromise = new Promise((resolve)=>{
    if(!('indexedDB' in window)){ resolve(null); return; }
    const req = indexedDB.open(DB_NAME,1);
    req.onupgradeneeded = ()=>{ req.result.createObjectStore(STORE); };
    req.onsuccess = ()=> resolve(req.result);
    req.onerror = ()=> resolve(null);
  });
  return dbPromise;
}
async function idbGet(key){
  const db = await openDB();
  if(!db) return localStorage.getItem(key);
  return new Promise((resolve)=>{
    const tx = db.transaction(STORE,'readonly');
    const req = tx.objectStore(STORE).get(key);
    req.onsuccess = ()=> resolve(req.result ?? null);
    req.onerror = ()=> resolve(null);
  });
}
async function idbSet(key,value){
  const db = await openDB();
  if(!db){ localStorage.setItem(key,value); return true; }
  return new Promise((resolve)=>{
    const tx = db.transaction(STORE,'readwrite');
    tx.objectStore(STORE).put(value,key);
    tx.oncomplete = ()=> resolve(true);
    tx.onerror = ()=> resolve(false);
  });
}

function getToday(dateStr){
  dateStr = dateStr || todayStr();
  if(!dailyLogs[dateStr]){
    dailyLogs[dateStr] = {weight:null, waist:null, water:0, exerciseLog:[], notes:'', meals:[], eatStart:null, eatEnd:null, steps:null, activityLevel:null};
  }
  const t = dailyLogs[dateStr];
  if(t.exerciseLog===undefined) t.exerciseLog = (t.exercise||[]).map(name=>({name,minutes:30}));
  if(t.eatStart===undefined) t.eatStart=null;
  if(t.eatEnd===undefined) t.eatEnd=null;
  if(t.steps===undefined) t.steps=null;
  if(t.activityLevel===undefined) t.activityLevel=null;
  return t;
}
function pastDates(n){
  const list=[];
  for(let i=0;i<n;i++){ const d=new Date(); d.setDate(d.getDate()-i); list.push(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')); }
  return list;
}
function lastEatEnd(){
  const dates = Object.keys(dailyLogs).sort();
  for(let i=dates.length-1;i>=0;i--){ const d=dailyLogs[dates[i]]; if(d && d.eatEnd) return {date:dates[i], time:d.eatEnd}; }
  return null;
}
function fastingStatus(){
  const today = getToday(); const now = new Date();
  if(today.eatStart && !today.eatEnd){ const start=new Date(today.eatStart); return {state:'eating', minutes: Math.round((now-start)/60000)}; }
  const last = lastEatEnd();
  if(!last) return {state:'unknown', hours:0};
  return {state:'fasting', hours:(now-new Date(last.time))/3600000};
}

/* ============ DERIVED DATA ============ */
function currentWeight(){ return weightLog.length===0 ? settings.startWeight : weightLog[weightLog.length-1].weight; }
function currentWaist(){ const w=[...weightLog].reverse().find(e=>e.waist); return w? w.waist : settings.startWaist; }
function streakDays(){
  let n=0, d=new Date();
  while(true){
    const key = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    const log = dailyLogs[key];
    if(log && (log.meals.length>0 || log.weight)){ n++; d.setDate(d.getDate()-1); } else break;
  }
  return n;
}
function mealTotals(meal){
  return (meal||[]).reduce((acc,item)=>{
    const f = allFoods().find(x=>x.id===item.foodId);
    if(!f) return acc;
    acc.cal += f.cal*item.qty; acc.protein += f.protein*item.qty;
    acc.carbs += f.carbs*item.qty; acc.fat += f.fat*item.qty; acc.fiber += f.fiber*item.qty;
    return acc;
  },{cal:0,protein:0,carbs:0,fat:0,fiber:0});
}
function foodFrequencyMap(){
  const freq={};
  Object.values(dailyLogs).forEach(day=>{ (day.meals||[]).forEach(m=>{ freq[m.foodId]=(freq[m.foodId]||0)+m.qty; }); });
  return freq;
}
function dynamicMilestones(){
  const start = settings.startWeight, goal = settings.goalWeight;
  if(!(start>goal)) return [goal];
  const step = (start-goal)>=20 ? MILESTONE_STEP_LARGE : MILESTONE_STEP_SMALL;
  let list = []; let m = Math.floor(start/step)*step;
  if(m>=start) m -= step;
  while(m>goal){ list.push(round1(m)); m -= step; }
  list.push(goal);
  return list;
}
function bmrTdee(){
  const w = currentWeight(), h = settings.heightCm, age = settings.age, sex = settings.sex;
  if(!h || !age || !sex) return null;
  let bmr = sex==='male' ? (10*w + 6.25*h - 5*age + 5) : (10*w + 6.25*h - 5*age - 161);
  const level = ACTIVITY_LEVELS.find(a=>a.id===settings.activityMultLevel) || ACTIVITY_LEVELS[1];
  const tdee = bmr * level.mult;
  return {bmr: Math.round(bmr), tdee: Math.round(tdee)};
}

/* ============ TIME / RING HELPERS ============ */
function timeStr(iso){ return new Date(iso).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}); }
function nowClock(){ return new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',second:'2-digit'}); }
function ringSvg(pct, size, color, label, sub, idPrefix){
  const r = size/2-8, c=2*Math.PI*r, cx=size/2, cy=size/2;
  const off = c - clamp(pct,0,1)*c;
  const fgId = idPrefix ? `id="${idPrefix}-fg"` : '';
  const vId = idPrefix ? `id="${idPrefix}-v"` : '';
  return `<div class="ring-wrap" style="width:${size}px;height:${size}px;">
    <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
      <circle class="ring-bg" cx="${cx}" cy="${cy}" r="${r}"/>
      <circle class="ring-fg" ${fgId} cx="${cx}" cy="${cy}" r="${r}" stroke="${color}" stroke-dasharray="${c}" stroke-dashoffset="${off}"/>
    </svg>
    <div class="ring-label"><div class="rv" ${vId}>${label}</div><div class="rl">${sub}</div></div>
  </div>`;
}

function computeBadges(){
  const streak = streakDays();
  const totalLogged = Object.keys(dailyLogs).filter(d=>(dailyLogs[d].meals||[]).length>0||dailyLogs[d].weight).length;
  const weightLost = round1(settings.startWeight - currentWeight());

/* ============ MENU ============ */
function pickWeighted(pool, excludeIds, freq){
  const candidates = pool.filter(f=>!excludeIds.includes(f.id));
  if(candidates.length===0) return null;
  candidates.sort((a,b)=> (freq[b.id]||0)-(freq[a.id]||0));
  const topN = candidates.slice(0, Math.min(5, candidates.length));
  return topN[Math.floor(Math.random()*topN.length)];
}
function eligiblePool(){
  const wknd = isWeekend(todayStr());
  return allFoods().filter(f=>{
    if(f.tags.includes('chicken')) return menuFilters.chicken && wknd;
    if(f.tags.includes('fish')) return menuFilters.fish;
    if(f.tags.includes('egg')) return menuFilters.egg;
    if(f.tags.includes('tofu')) return menuFilters.tofu || menuFilters.veg;
    if(!menuFilters.veg) return false;
    if(menuFilters.region!=='any' && f.region!=='both' && f.region!==menuFilters.region) return false;
    return true;
  });
}
function generateMenu(){
  const pool = eligiblePool();
  if(pool.length===0){ showToast('No foods match your filters'); return; }
  const freq = foodFrequencyMap();
  let combo=[], cal=0, protein=0, usedIds=[];

  if(menuFilters.anchors){
    const peanuts = FOODS.find(f=>f.id==='peanuts'), chana = FOODS.find(f=>f.id==='roastedchana');
    if(peanuts){ combo.push({foodId:'peanuts',qty:1}); cal+=peanuts.cal; protein+=peanuts.protein; usedIds.push('peanuts'); }
    if(chana){ combo.push({foodId:'roastedchana',qty:1}); cal+=chana.cal; protein+=chana.protein; usedIds.push('roastedchana'); }
  }

  const proteinPool = pool.filter(f=> f.cal>0 && f.protein/f.cal > 0.08);
  let primary = pickWeighted(proteinPool.length?proteinPool:pool, usedIds, freq);
  if(primary){
    const remainingProtein = Math.max(0, settings.proteinTarget*0.6 - protein);
    let qty = primary.protein>0 ? Math.round(remainingProtein/primary.protein) : 1;
    qty = clamp(qty,1,4);
    while(qty>1 && cal+primary.cal*qty > settings.calorieTarget*0.7) qty--;
    combo.push({foodId:primary.id, qty}); cal+=primary.cal*qty; protein+=primary.protein*qty; usedIds.push(primary.id);
  }

  if(protein < settings.proteinTarget*0.75){
    const secondaryPool = pool.filter(f=> f.protein>3);
    let secondary = pickWeighted(secondaryPool, usedIds, freq);
    if(secondary){
      let qty=1;
      while(protein+secondary.protein*qty < settings.proteinTarget*0.85 && cal+secondary.cal*(qty+1) <= settings.calorieTarget*0.9 && qty<3) qty++;
      combo.push({foodId:secondary.id, qty}); cal+=secondary.cal*qty; protein+=secondary.protein*qty; usedIds.push(secondary.id);
    }
  }

  const carbPool = pool.filter(f=> f.carbs > f.protein*1.5);
  let staple = pickWeighted(carbPool.length?carbPool:pool, usedIds, freq);
  if(staple){
    let remainingCal = settings.calorieTarget - cal;
    let qty = Math.max(1, Math.round(remainingCal*0.6/staple.cal));
    qty = clamp(qty,1,3);
    while(qty>1 && cal+staple.cal*qty > settings.calorieTarget*1.05) qty--;
    combo.push({foodId:staple.id, qty}); cal+=staple.cal*qty; protein+=staple.protein*qty; usedIds.push(staple.id);
  }

  const vegPool = pool.filter(f=> f.fiber>=2 && f.cal<120);
  let veggie = pickWeighted(vegPool, usedIds, freq);
  if(veggie && cal+veggie.cal <= settings.calorieTarget*1.08){
    combo.push({foodId:veggie.id, qty:1}); cal+=veggie.cal; protein+=veggie.protein; usedIds.push(veggie.id);
  }

  if(cal < settings.calorieTarget*0.85 && staple){
    const item = combo.find(c=>c.foodId===staple.id);
    if(item && cal+staple.cal <= settings.calorieTarget*1.1){ item.qty+=1; cal+=staple.cal; protein+=staple.protein; }
  }

  lastMenu = combo; lastMenuTotals = {cal, protein};
  render();
}

/* ============ SEARCH ============ */
function searchFoods(query, list){
  if(!query) return list;
  const q = query.toLowerCase();
  const starts = list.filter(f=>f.name.toLowerCase().startsWith(q));
  const contains = list.filter(f=>!f.name.toLowerCase().startsWith(q) && f.name.toLowerCase().includes(q));
  return [...starts, ...contains];
}

  <div class="card">

      </div>`;

    <div class="chip-row">${ACTIVITY_LEVELS.map(a=>`<div class="chip ${today.activityLevel===a.id?'active':''}" onclick="setActivityLevel('${a.id}')">${a.label}</div>`).join('')}</div>
    <button class="btn ghost sm block" style="margin-top:8px;" onclick="saveSteps()">Save steps</button>

    <div class="row" style="margin-top:8px;"><span class="small">Estimated calories burned</span><span class="num" style="font-weight:600;">${Math.round(exerciseCalories(today))} kcal</span></div>

function customFoodFormHtml(){
  const editing = editingCustomFoodId ? customFoods.find(f=>f.id===editingCustomFoodId) : null;
  return `<div class="custom-food-form">
    <input type="text" id="cf-name" placeholder="Food name" value="${editing?editing.name:''}">
    <div class="form-grid2" style="margin-top:8px;"><input type="number" id="cf-cal" placeholder="kcal" value="${editing?editing.cal:''}"><input type="number" id="cf-protein" placeholder="Protein g" value="${editing?editing.protein:''}"></div>
    <div class="form-grid3" style="margin-top:8px;"><input type="number" id="cf-carbs" placeholder="Carbs g" value="${editing?editing.carbs:''}"><input type="number" id="cf-fat" placeholder="Fat g" value="${editing?editing.fat:''}"><input type="number" id="cf-fiber" placeholder="Fiber g" value="${editing?editing.fiber:''}"></div>
    <input type="text" id="cf-serving-label" placeholder="Serving label (e.g. 1 bowl)" value="${editing?editing.serving:''}" style="margin-top:8px;">
    <button class="btn accent sm block" style="margin-top:8px;" onclick="saveCustomFood()">${editing?'Save changes':'Save and add to today'}</button>
  </div>`;
}
function exerciseCalories(today){
  const w = currentWeight();
  return today.exerciseLog.reduce((sum,e)=> sum + (e.met*3.5*w/200)*e.minutes, 0);
}
function setExerciseMinutes(name, val, met){
  const today = getToday(selectedLogDate);
  const mins = parseInt(val)||0;
  const idx = today.exerciseLog.findIndex(e=>e.name===name);
  if(mins<=0){ if(idx>=0) today.exerciseLog.splice(idx,1); }
  else if(idx>=0) today.exerciseLog[idx].minutes = mins;
  else today.exerciseLog.push({name, minutes:mins, met});
  saveDailyLogs(); render();
}
function addFood(foodId){
  const today = getToday(selectedLogDate);
  const existing = today.meals.find(m=>m.foodId===foodId);
  if(existing) existing.qty += 1; else today.meals.push({foodId, qty:1});
  saveDailyLogs(); render();
}
function changeMealQty(idx, delta){
  const today = getToday(selectedLogDate);
  today.meals[idx].qty = Math.max(1, today.meals[idx].qty+delta);
  saveDailyLogs(); render();
}
function removeMealItem(idx){ const today=getToday(selectedLogDate); today.meals.splice(idx,1); saveDailyLogs(); render(); }
async function saveCustomFood(){
  const name = document.getElementById('cf-name').value.trim();
  const cal = parseFloat(document.getElementById('cf-cal').value)||0;
  const protein = parseFloat(document.getElementById('cf-protein').value)||0;
  const carbs = parseFloat(document.getElementById('cf-carbs').value)||0;
  const fat = parseFloat(document.getElementById('cf-fat').value)||0;
  const fiber = parseFloat(document.getElementById('cf-fiber').value)||0;
  const servingLabel = document.getElementById('cf-serving-label').value.trim() || '1 serving';
  if(!name || !cal){ showToast('Add at least a name and calories'); return; }
  if(editingCustomFoodId){
    const f = customFoods.find(x=>x.id===editingCustomFoodId);
    Object.assign(f, {name, cal, protein, carbs, fat, fiber, serving:servingLabel});
    await saveCustomFoods(); showToast('Custom food updated');
  } else {
    const id = 'custom_' + Date.now();
    customFoods.push({id, name, serving:servingLabel, cal, protein, carbs, fat, fiber, tags:['veg'], region:'both', custom:true});
    await saveCustomFoods();
    addFood(id);
    showToast('Custom food added');
  }
  showCustomFoodForm = false; editingCustomFoodId = null; render();
}
function editCustomFood(id){ editingCustomFoodId=id; showCustomFoodForm=true; switchTab('today'); }
async function deleteCustomFood(id){ customFoods = customFoods.filter(f=>f.id!==id); await saveCustomFoods(); showToast('Custom food removed'); render(); }
function setActivityLevel(id){ const t=getToday(selectedLogDate); t.activityLevel = t.activityLevel===id?null:id; saveDailyLogs(); render(); }
function saveSteps(){ const t=getToday(selectedLogDate); const v=document.getElementById('steps-input').value; t.steps = v?parseInt(v):null; saveDailyLogs(); showToast('Steps saved'); render(); }
function addWater(amt){ const t=getToday(selectedLogDate); t.water = Math.max(0, round1(t.water+amt)); saveDailyLogs(); render(); }
async function saveToday(){
  const dateStr = selectedLogDate || todayStr();
  const today = getToday(dateStr);
  const w = document.getElementById('weight-input').value, wa = document.getElementById('waist-input').value, notes = document.getElementById('notes-input').value;
  today.notes = notes;
  if(w){
    today.weight = parseFloat(w);
    const idx = weightLog.findIndex(e=>e.date===dateStr);
    const entry = {date:dateStr, weight:parseFloat(w), waist: wa?parseFloat(wa):(weightLog[idx]?.waist||null)};
    if(idx>=0) weightLog[idx]=entry; else weightLog.push(entry);
  } else if(wa){
    today.waist = parseFloat(wa);
    const idx = weightLog.findIndex(e=>e.date===dateStr);
    if(idx>=0) weightLog[idx].waist = parseFloat(wa);
  }
  weightLog.sort((a,b)=>a.date.localeCompare(b.date));
  await saveDailyLogs(); await saveWeightLog();
  showToast(dateStr===todayStr() ? 'Today saved to the ledger' : fmtDate(dateStr)+' saved to the ledger'); render();
}

/* ============ PROGRESS ============ */
function lineChartSvg(points, color, unitSuffix){
  if(points.length<2) return `<div class="empty">Log a couple more entries to see this trend.</div>`;
  const w=320,h=140,pad=24; const vals=points.map(p=>p.v); const minV=Math.min(...vals)-1, maxV=Math.max(...vals)+1;
  const pts = points.map((p,i)=>{ const x=pad+(i/(points.length-1))*(w-2*pad); const y=h-pad-((p.v-minV)/(maxV-minV||1))*(h-2*pad); return [x,y]; });
  const path = pts.map((p,i)=>(i===0?'M':'L')+p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
  const dots = pts.map(p=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="3" fill="${color}"/>`).join('');
  return `<svg class="chart" viewBox="0 0 ${w} ${h}"><path d="${path}" fill="none" stroke="${color}" stroke-width="2"/>${dots}</svg>
  <div class="row small"><span>${points[0].v}${unitSuffix}</span><span>${points[points.length-1].v}${unitSuffix}</span></div>`;
}
function barChartSvg(points, color, unit){
  if(points.length===0) return `<div class="empty">No entries yet.</div>`;
  const w=320,h=110,pad=10,gap=4; const vals=points.map(p=>p.v); const maxV=Math.max(...vals,1);
  const bw=(w-2*pad)/points.length-gap;
  const bars = points.map((p,i)=>{ const bh=(p.v/maxV)*(h-2*pad); const x=pad+i*((w-2*pad)/points.length); const y=h-pad-bh;
    return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${bh.toFixed(1)}" rx="2" fill="${color}"/>`; }).join('');
  return `<svg class="chart" viewBox="0 0 ${w} ${h}">${bars}</svg>
  <div class="row small"><span>Avg ${Math.round(vals.reduce((a,b)=>a+b,0)/vals.length)} ${unit}</span><span>Best ${maxV} ${unit}</span></div>`;
}
function estFatLossKg(w){ return round1((settings.startWeight-w)*0.85); }
function renderProgress(){
  const cw = currentWeight();
  const weightPts = weightLog.filter(e=>e.weight).map(e=>({v:e.weight}));
  const waistPts = weightLog.filter(e=>e.waist).map(e=>({v:e.waist}));
  const fatPts = weightLog.filter(e=>e.weight).map(e=>({v:estFatLossKg(e.weight)}));
  const stepsDates = Object.keys(dailyLogs).sort().slice(-14).filter(d=>dailyLogs[d].steps);
  const stepsPts = stepsDates.map(d=>({v:dailyLogs[d].steps}));
  const badges = computeBadges();
  return `
  <div class="card"><div class="card-label">Weight trend (kg)</div>${lineChartSvg(weightPts,'var(--turmeric)','kg')}</div>
  <div class="card"><div class="card-label">Waist trend (cm)</div>${lineChartSvg(waistPts,'var(--sage-dark)','cm')}</div>
  <div class="card"><div class="card-label">Estimated fat lost (kg)</div>${lineChartSvg(fatPts,'var(--rust)','kg')}
    <div class="small" style="margin-top:6px;">Rough estimate assuming about 85% of weight lost is fat — not a clinical measurement.</div></div>
  <div class="card"><div class="card-label">Steps — last 14 logged days</div>${barChartSvg(stepsPts,'var(--sage)','steps')}</div>
  <div class="card"><div class="card-label">Milestones</div>${milestoneTrackHtml(cw)}
    <div class="stamp-grid" style="margin-top:14px;">${dynamicMilestones().map(m=>`<div class="stamp ${cw<=m?'':'locked'}">${m}<div class="sl">kg</div></div>`).join('')}</div></div>
  <div class="card"><div class="card-label">Rewards</div>
    <div class="stamp-grid">${badges.map(b=>`<div class="stamp ${b.unlocked?'':'locked'}" title="${b.label}">${b.icon}<div class="sl">${b.label}</div></div>`).join('')}</div></div>
  <div class="card"><div class="card-label">Entries</div>
    ${weightLog.length===0 ? '<div class="empty">No entries yet.</div>' : [...weightLog].reverse().slice(0,20).map(e=>`
      <div class="food-item"><div class="fi-name">${fmtDate(e.date)}</div><div class="fi-sub num">${e.weight?e.weight+' kg':'—'} ${e.waist?' · '+e.waist+' cm':''}</div></div>`).join('')}
  </div>`;
}

/* ============ SWIPE NAVIGATION ============ */
let touchStartX=0, touchStartY=0;
document.addEventListener('touchstart', (e)=>{
  touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY;
}, {passive:true});
document.addEventListener('touchend', (e)=>{
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if(Math.abs(dx) > 70 && Math.abs(dx) > Math.abs(dy)*1.6){
    const idx = tabOrder.indexOf(currentTab);
    if(dx < 0 && idx < tabOrder.length-1) switchTab(tabOrder[idx+1]);
    else if(dx > 0 && idx > 0) switchTab(tabOrder[idx-1]);
  }
}, {passive:true});

/* ============ SMOOTH LIVE TICK (no full re-render) ============ */
function liveTick(){
  if(currentTab!=='home' && currentTab!=='today') return;
  document.querySelectorAll('.now-clock').forEach(el=>{ el.textContent = 'Now: ' + nowClock(); });
  const status = fastingStatus();
  const fg = document.getElementById('fast-ring-fg'), vLabel = document.getElementById('fast-ring-v');
  if(fg && vLabel){
    const targetFastHrs = 24 - settings.targetEatingWindowHrs;
    let pct, label;
    if(status.state==='eating'){
      pct = status.minutes/(settings.targetEatingWindowHrs*60);
      const h=Math.floor(status.minutes/60), m=status.minutes%60;
      label = (h>0?h+'h ':'')+m+'m';
    } else if(status.state==='fasting'){
      pct = status.hours/targetFastHrs;
      const h=Math.floor(status.hours), m=Math.round((status.hours-h)*60);
      label = h+'h '+m+'m';
    }
    if(pct!=null){
      const r = parseFloat(fg.getAttribute('r')); const c = 2*Math.PI*r;
      fg.setAttribute('stroke-dashoffset', c - clamp(pct,0,1)*c);
      vLabel.textContent = label;
    }
  }
}
setInterval(liveTick, 1000);


document.querySelectorAll('nav.tabbar button').forEach(b=>{ b.addEventListener('click', ()=>switchTab(b.dataset.tab)); });
document.getElementById('theme-toggle').addEventListener('click', ()=>{
  settings.darkMode = !settings.darkMode;
  document.documentElement.setAttribute('data-theme', settings.darkMode?'dark':'light');
  saveSettings();
});

let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', (e)=>{ e.preventDefault(); deferredPrompt=e; if(currentTab==='settings') render(); });
async function triggerInstall(){ if(!deferredPrompt) return; deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt=null; render(); }

(async function init(){
  await loadAll();
  document.documentElement.setAttribute('data-theme', settings.darkMode?'dark':'light');
  render();
  setInterval(()=>{ if(currentTab==='home' || currentTab==='today') render(); }, 300000);
})();

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{ navigator.serviceWorker.register('sw.js').catch(()=>{}); });
}
