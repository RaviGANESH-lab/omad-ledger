<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Nutrition Ledger</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Nutrition Ledger">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#123A5E">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   NUTRITION LEDGER — built-from-scratch design system
   Premium mobile PWA look: animated sunrise gradient, glass
   cards, floating orbs, rounded pill controls, subtle motion.
   ============================================================ */
:root{
  --ink:#FFFFFF;
  --ink-soft:rgba(255,255,255,0.74);
  --ink-faint:rgba(255,255,255,0.5);
  --line:rgba(255,255,255,0.22);
  --card:rgba(255,255,255,0.11);
  --card-solid:rgba(20,30,48,0.55);
  --paper-2:rgba(255,255,255,0.16);
  --gold:#F5C451;
  --gold-2:#FFD87A;
  --coral:#FF7A59;
  --coral-2:#FFAB8F;
  --emerald:#2FD9A2;
  --emerald-2:#7CF0C6;
  --navy-text:#12233F;
  --turmeric:var(--gold); --turmeric-dark:var(--gold-2);
  --rust:var(--coral); --rust-dark:var(--coral-2);
  --sage:var(--emerald); --sage-dark:var(--emerald-2);
  --radius-lg:22px; --radius-md:16px; --radius-sm:12px;
}
[data-theme="dark"]{
  --ink:#F2F5FA; --ink-soft:rgba(242,245,250,0.7); --ink-faint:rgba(242,245,250,0.46);
  --line:rgba(255,255,255,0.14);
  --card:rgba(255,255,255,0.07);
  --paper-2:rgba(255,255,255,0.10);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  min-height:100vh; overflow-x:hidden;
  color:var(--ink); font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased;
  padding-bottom:92px;
  background:linear-gradient(135deg,#132C57 0%,#134E70 28%,#0E7A6B 55%,#1B9463 75%,#E8B94E 100%);
  background-size:340% 340%;
  animation:auroraShift 22s ease infinite;
}
[data-theme="dark"] body{
  background:linear-gradient(135deg,#080E1C 0%,#0B1B2E 30%,#0A2C2C 60%,#0C2620 100%);
  background-size:340% 340%;
  animation:auroraShift 26s ease infinite;
}
@keyframes auroraShift{
  0%{background-position:0% 30%;} 50%{background-position:100% 70%;} 100%{background-position:0% 30%;}
}
h1,h2,h3{font-family:'Poppins',sans-serif;font-weight:700;margin:0;letter-spacing:-0.01em;}
.num{font-family:'JetBrains Mono',monospace;}

/* floating decorative orbs + faint lifestyle glyphs, purely decorative */
.bg-decor{position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0;}
.orb{position:absolute;border-radius:50%;filter:blur(2px);opacity:0.5;animation:orbFloat linear infinite;}
.orb.o1{width:220px;height:220px;left:-60px;top:6%;background:radial-gradient(circle,var(--emerald) 0%,transparent 70%);animation-duration:26s;}
.orb.o2{width:260px;height:260px;right:-80px;top:18%;background:radial-gradient(circle,var(--gold) 0%,transparent 70%);animation-duration:32s;animation-direction:reverse;}
.orb.o3{width:180px;height:180px;left:8%;bottom:14%;background:radial-gradient(circle,#1e6fae 0%,transparent 70%);animation-duration:24s;}
.orb.o4{width:150px;height:150px;right:6%;bottom:30%;background:radial-gradient(circle,var(--coral) 0%,transparent 70%);animation-duration:20s;animation-direction:reverse;}
@keyframes orbFloat{
  0%{transform:translate(0,0) scale(1);} 50%{transform:translate(18px,-26px) scale(1.08);} 100%{transform:translate(0,0) scale(1);}
}
.glyphs{position:absolute;inset:0;font-size:64px;opacity:0.07;filter:blur(0.5px);}
.glyphs span{position:absolute;animation:glyphDrift ease-in-out infinite;}
@keyframes glyphDrift{0%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(-14px) rotate(6deg);}100%{transform:translateY(0) rotate(0deg);}}

.app{max-width:480px;margin:0 auto;padding:0 14px;position:relative;z-index:1;}

header.top{
  position:sticky;top:0;z-index:20;
  background:rgba(255,255,255,0.10);
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  padding:16px 14px 12px;border-bottom:1px solid var(--line);
  display:flex;align-items:center;justify-content:space-between;
}
header.top .brand{display:flex;align-items:center;gap:10px;}
header.top .brand .stamp-mini{
  width:36px;height:36px;border-radius:14px;
  background:linear-gradient(135deg,var(--gold),var(--coral));
  display:flex;align-items:center;justify-content:center;font-size:18px;
  box-shadow:0 4px 14px rgba(245,196,81,0.35);
}
header.top h1{font-size:19px;color:var(--ink);}
header.top .date{font-size:11px;color:var(--ink-soft);font-family:'JetBrains Mono',monospace;margin-top:1px;}
.theme-btn{
  background:var(--paper-2);border:1px solid var(--line);border-radius:50%;
  width:36px;height:36px;display:flex;align-items:center;justify-content:center;
  color:var(--ink);cursor:pointer;font-size:16px;transition:transform 0.15s ease;
}
.theme-btn:active{transform:scale(0.9);}

.screen{padding-top:16px;}
.screen.slide-left{animation:slideLeft 0.28s cubic-bezier(.2,.7,.3,1);}
.screen.slide-right{animation:slideRight 0.28s cubic-bezier(.2,.7,.3,1);}
@keyframes slideLeft{from{opacity:0;transform:translateX(16px);}to{opacity:1;transform:translateX(0);}}
@keyframes slideRight{from{opacity:0;transform:translateX(-16px);}to{opacity:1;transform:translateX(0);}}

.card{
  background:var(--card);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid var(--line);border-radius:var(--radius-lg);
  padding:18px 18px;margin-bottom:14px;position:relative;
  box-shadow:0 10px 30px rgba(4,10,24,0.28);
  animation:cardIn 0.35s ease;
}
@keyframes cardIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.card-label{font-size:11px;text-transform:uppercase;letter-spacing:0.09em;color:var(--ink-soft);margin-bottom:8px;font-weight:600;font-family:'Poppins',sans-serif;}
.stub{border-left:3px solid var(--gold);}
.stub.rust{border-left-color:var(--coral);}
.stub.sage{border-left-color:var(--emerald);}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.metric{background:var(--paper-2);border-radius:var(--radius-md);padding:12px 13px;border:1px solid var(--line);}
.metric .v{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:var(--ink);}
.metric .l{font-size:10.5px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:0.05em;margin-top:3px;}
.metric .d{font-size:11px;margin-top:4px;color:var(--emerald-2);font-weight:600;}

.bar-track{background:rgba(255,255,255,0.14);border-radius:8px;height:10px;overflow:hidden;margin-top:6px;}
.bar-fill{height:100%;border-radius:8px;background:linear-gradient(90deg,var(--gold),var(--gold-2));transition:width 0.6s cubic-bezier(.4,0,.2,1);}
.bar-fill.rust{background:linear-gradient(90deg,var(--coral),var(--coral-2));}
.bar-fill.sage{background:linear-gradient(90deg,var(--emerald),var(--emerald-2));}
.bar-row{margin-bottom:11px;}
.bar-row .top-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;}
.bar-row .top-row .name{color:var(--ink-soft);}
.bar-row .top-row .amt{font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--ink);}

button, select, input, textarea{font-family:'Inter',sans-serif;}
.btn{
  background:linear-gradient(135deg,#2A3F63,#1B2A45);color:var(--ink);border:none;
  border-radius:var(--radius-md);padding:11px 18px;font-size:13.5px;font-weight:600;cursor:pointer;
  box-shadow:0 6px 16px rgba(0,0,0,0.3);transition:transform 0.14s ease, box-shadow 0.14s ease, filter 0.14s ease;
}
.btn:active{transform:scale(0.96);filter:brightness(0.95);}
.btn.ghost{background:var(--paper-2);color:var(--ink);border:1px solid var(--line);box-shadow:none;}
.btn.accent{background:linear-gradient(135deg,var(--gold-2),var(--gold));color:var(--navy-text);box-shadow:0 6px 18px rgba(245,196,81,0.4);}
.btn.rust{background:linear-gradient(135deg,var(--coral-2),var(--coral));color:#3A1408;box-shadow:0 6px 18px rgba(255,122,89,0.4);}
.btn.sage{background:linear-gradient(135deg,var(--emerald-2),var(--emerald));color:#083424;box-shadow:0 6px 18px rgba(47,217,162,0.35);}
.btn.block{width:100%;}
.btn.sm{padding:7px 12px;font-size:12px;border-radius:12px;}
.btn:disabled{opacity:0.35;cursor:not-allowed;}

.chip-row{display:flex;flex-wrap:wrap;gap:8px;}
.chip{
  border:1px solid var(--line);border-radius:999px;padding:7px 14px;font-size:12px;cursor:pointer;
  background:var(--paper-2);color:var(--ink-soft);transition:transform 0.12s ease, background 0.12s ease;
}
.chip:active{transform:scale(0.94);}
.chip.active{background:linear-gradient(135deg,var(--gold-2),var(--gold));border-color:transparent;color:var(--navy-text);font-weight:700;}

input[type=number], input[type=text], input[type=date], input[type=time], select, textarea{
  width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:var(--radius-md);
  background:var(--paper-2);color:var(--ink);font-size:14px;
}
input::placeholder, textarea::placeholder{color:var(--ink-faint);}
textarea{resize:vertical;min-height:52px;}
label.field-label{font-size:11px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:0.06em;display:block;margin-bottom:5px;margin-top:12px;font-family:'Poppins',sans-serif;}

.food-item{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:11px 0;border-bottom:1px solid var(--line);}
.food-item:last-child{border-bottom:none;}
.food-item .fi-name{font-size:13.5px;font-weight:600;color:var(--ink);}
.food-item .fi-sub{font-size:11px;color:var(--ink-soft);font-family:'JetBrains Mono',monospace;margin-top:2px;}
.food-item .fi-tag{font-size:9px;text-transform:uppercase;padding:2px 7px;border-radius:8px;background:var(--paper-2);color:var(--ink-soft);margin-left:5px;}
.fi-actions{display:flex;gap:6px;flex-shrink:0;}
.qty-ctrl{display:flex;align-items:center;gap:7px;flex-shrink:0;}
.qty-ctrl button{width:26px;height:26px;border-radius:50%;border:1px solid var(--line);background:var(--paper-2);color:var(--ink);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.qty-ctrl .q{font-family:'JetBrains Mono',monospace;min-width:16px;text-align:center;font-size:13px;}

.stamp{
  display:inline-flex;flex-direction:column;align-items:center;justify-content:center;
  width:66px;height:66px;border-radius:18px;border:1px solid var(--line);color:var(--ink-faint);font-size:22px;margin:4px;
  background:var(--paper-2);transition:transform 0.3s ease, opacity 0.3s ease;
}
.stamp.unlocked{
  border-color:transparent;color:var(--navy-text);
  background:linear-gradient(150deg,var(--gold-2),var(--gold));
  box-shadow:0 6px 18px rgba(245,196,81,0.4);
}
.stamp.locked{opacity:0.45;}
.stamp .sl{font-size:7.5px;text-transform:uppercase;letter-spacing:0.02em;margin-top:3px;text-align:center;line-height:1.2;padding:0 4px;}
.stamp-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:2px;}
.stamp.newly{animation:stampCelebrate 0.7s ease;}
@keyframes stampCelebrate{0%{transform:scale(0.6) rotate(-10deg);}55%{transform:scale(1.18) rotate(5deg);}100%{transform:scale(1) rotate(0);}}

nav.tabbar{
  position:fixed;bottom:0;left:0;right:0;z-index:30;
  background:rgba(10,20,38,0.55);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--line);
  display:flex;justify-content:space-around;padding:8px 6px 12px;max-width:480px;margin:0 auto;
}
nav.tabbar button{
  background:none;border:none;color:var(--ink-faint);
  display:flex;flex-direction:column;align-items:center;gap:3px;font-size:9.5px;padding:5px 10px;border-radius:14px;
  cursor:pointer;text-transform:uppercase;letter-spacing:0.03em;transition:color 0.15s ease, transform 0.15s ease;
}
nav.tabbar button .ic{font-size:18px;}
nav.tabbar button.active{color:var(--gold-2);transform:translateY(-2px);}
nav.tabbar button.locked{opacity:0.35;}

.empty{text-align:center;padding:26px 10px;color:var(--ink-faint);font-size:13px;}
.toast{
  position:fixed;bottom:96px;left:50%;transform:translateX(-50%);
  background:rgba(15,25,45,0.92);color:#fff;padding:10px 20px;border-radius:999px;
  font-size:12.5px;z-index:50;opacity:0;transition:opacity 0.25s;pointer-events:none;max-width:88%;text-align:center;
  border:1px solid rgba(255,255,255,0.15);
}
.toast.show{opacity:1;}
.row{display:flex;justify-content:space-between;align-items:center;gap:8px;}
.small{font-size:11.5px;color:var(--ink-soft);}
.divider{height:1px;background:var(--line);margin:14px 0;}
svg.chart{width:100%;height:auto;display:block;}
.menu-card{background:var(--paper-2);border-radius:var(--radius-md);padding:14px;margin-top:10px;border:1px solid var(--line);}
.warn{background:rgba(255,122,89,0.14);border-left:3px solid var(--coral);border-radius:8px;padding:9px 11px;font-size:12px;color:#FFD9CC;margin-top:9px;}
.note{background:var(--paper-2);border-radius:10px;padding:9px 11px;font-size:12px;color:var(--ink-soft);margin-top:9px;line-height:1.55;}
.loading{text-align:center;padding:70px 20px;color:var(--ink-soft);font-family:'JetBrains Mono',monospace;font-size:12px;}

.fast-ring{display:flex;align-items:center;gap:18px;}
.ring-wrap{position:relative;flex-shrink:0;}
.ring-wrap svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:rgba(255,255,255,0.14);stroke-width:8;}
.ring-fg{fill:none;stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset 0.7s cubic-bezier(.4,0,.2,1);}
.ring-label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.ring-label .rv{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:14px;color:var(--ink);}
.ring-label .rl{font-size:8px;color:var(--ink-soft);text-transform:uppercase;}
.clock{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink-soft);}
.time-row{display:flex;gap:8px;} .time-row > *{flex:1;}
.custom-food-form{background:var(--paper-2);border-radius:var(--radius-md);padding:13px;margin-top:9px;border:1px solid var(--line);}
.form-grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.form-grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}

.milestone-track{position:relative;height:9px;background:rgba(255,255,255,0.14);border-radius:8px;margin:22px 0 12px;}
.milestone-track .fill{position:absolute;top:0;left:0;height:100%;border-radius:8px;background:linear-gradient(90deg,var(--emerald),var(--gold));}
.milestone-track .tick{position:absolute;top:-16px;transform:translateX(-50%);font-size:10px;color:var(--ink-soft);font-family:'JetBrains Mono',monospace;white-space:nowrap;}
.milestone-track .tickmark{position:absolute;top:0;width:2px;height:9px;background:rgba(10,20,38,0.4);}
.milestone-track .dot{position:absolute;top:-5px;width:18px;height:18px;border-radius:50%;background:var(--coral);border:3px solid rgba(255,255,255,0.9);transform:translateX(-50%);box-shadow:0 2px 8px rgba(0,0,0,0.3);}
.est-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line);font-size:12.5px;color:var(--ink);}
.est-row:last-child{border-bottom:none;}
.gate-overlay{text-align:center;padding:34px 16px;}
.lock-icon{font-size:32px;margin-bottom:10px;}
.about-list{font-size:12.5px;line-height:2;color:var(--ink-soft);}

.ticker-wrap{overflow:hidden;white-space:nowrap;background:var(--paper-2);border:1px solid var(--line);border-radius:999px;padding:8px 0;margin-bottom:14px;}
.ticker-track{display:inline-block;padding-left:100%;animation:tickerScroll 22s linear infinite;font-size:12px;color:var(--ink-soft);}
.ticker-track span{margin-right:38px;}
.ticker-track span.hl{color:var(--gold-2);font-weight:700;}
@keyframes tickerScroll{from{transform:translateX(0);}to{transform:translateX(-100%);}}

.badge-pop{
  position:fixed;top:18px;left:50%;transform:translateX(-50%) scale(0.8);z-index:60;
  background:rgba(15,25,45,0.92);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,0.2);
  border-radius:18px;padding:12px 20px;display:flex;align-items:center;gap:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.35);opacity:0;pointer-events:none;
}
.badge-pop.show{animation:badgePop 2.8s ease forwards;}
.badge-pop .bp-icon{font-size:28px;}
.badge-pop .bp-text{font-size:12.5px;color:#fff;}
.badge-pop .bp-text b{display:block;font-family:'Poppins',sans-serif;font-size:14px;color:var(--gold-2);}
@keyframes badgePop{
  0%{opacity:0;transform:translateX(-50%) scale(0.7) translateY(-12px);}
  12%{opacity:1;transform:translateX(-50%) scale(1.06) translateY(0);}
  18%{transform:translateX(-50%) scale(1) translateY(0);}
  85%{opacity:1;} 100%{opacity:0;transform:translateX(-50%) scale(0.95) translateY(-8px);}
}
.recent-unlock-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line);}
.recent-unlock-row:last-child{border-bottom:none;}
.recent-unlock-row .ric{font-size:22px;}
.recent-unlock-row .rlabel{font-size:13px;font-weight:600;color:var(--ink);}
.recent-unlock-row .rtime{font-size:10.5px;color:var(--ink-faint);}

.confetti-piece{position:fixed;top:-10px;width:8px;height:14px;z-index:70;pointer-events:none;border-radius:2px;}

.axis-title{font-size:10px;fill:var(--ink-faint);font-family:'Poppins',sans-serif;}
.axis-label{font-size:9px;fill:var(--ink-faint);font-family:'JetBrains Mono',monospace;}
.grid-line{stroke:rgba(255,255,255,0.10);stroke-width:1;}
.weekly-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--line);font-size:12px;}
.weekly-row:last-child{border-bottom:none;}
.weekly-row .wk-arrow{font-family:'JetBrains Mono',monospace;font-weight:700;}
.weekly-row .wk-arrow.down{color:var(--emerald-2);}
.weekly-row .wk-arrow.up{color:var(--coral-2);}
</style>
</head>
<body>
<div class="bg-decor">
  <div class="orb o1"></div>
  <div class="orb o2"></div>
  <div class="orb o3"></div>
  <div class="orb o4"></div>
  <div class="glyphs">
    <span style="top:10%;left:6%;animation-duration:14s;">🥗</span>
    <span style="top:22%;right:8%;animation-duration:17s;">🍳</span>
    <span style="top:48%;left:2%;animation-duration:15s;">🐟</span>
    <span style="top:64%;right:4%;animation-duration:19s;">🥜</span>
    <span style="top:78%;left:14%;animation-duration:16s;">💧</span>
    <span style="top:36%;left:44%;animation-duration:20s;">🏋️</span>
  </div>
</div>
<div class="app">
  <header class="top">
    <div class="brand">
      <div class="stamp-mini">🍽</div>
      <div><h1>Nutrition Ledger</h1><div class="date" id="header-date">—</div></div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;">
      <button class="theme-btn" id="header-install-btn" onclick="triggerInstall()" style="display:none;" aria-label="Install app">⬇</button>
      <button class="theme-btn" id="theme-toggle" aria-label="Toggle dark mode">◐</button>
    </div>
  </header>
  <div id="root"><div class="loading">Opening the ledger…</div></div>
</div>
<nav class="tabbar">
  <button data-tab="home" class="active"><span class="ic">⌂</span>Home</button>
  <button data-tab="settings"><span class="ic">⚙</span>Plan</button>
  <button data-tab="menu"><span class="ic">🍽</span>Menu</button>
  <button data-tab="today"><span class="ic">✎</span>Today</button>
  <button data-tab="foods"><span class="ic">▤</span>Foods</button>
  <button data-tab="progress"><span class="ic">◈</span>Progress</button>
</nav>
<div class="toast" id="toast"></div>
<div class="badge-pop" id="badge-pop"></div>

<script>
/* ============ FOOD DATABASE ============ */
/* region: 'north' | 'south' | 'both' */

/* ============ STORAGE (local, offline) ============ */
const DB_NAME='omad-ledger-db', STORE='kv';
let dbPromise=null;
function openDB(){
  if(dbPromise) return dbPromise;
  dbPromise = new Promise((resolve)=>{
    if(!('indexedDB' in window)){ resolve(null); return; }
    const req = indexedDB.open(DB_NAME,1);
    req.onupgradeneeded = ()=>{ req.result.createObjectStore(STORE); };
    req.onsuccess = ()=> resolve(req.result);
    req.onerror = ()=> resolve(null);
  });
  return dbPromise;
}
async function idbGet(key){
  const db = await openDB();
  if(!db) return localStorage.getItem(key);
  return new Promise((resolve)=>{
    const tx = db.transaction(STORE,'readonly');
    const req = tx.objectStore(STORE).get(key);
    req.onsuccess = ()=> resolve(req.result ?? null);
    req.onerror = ()=> resolve(null);
  });
}
async function idbSet(key,value){
  const db = await openDB();
  if(!db){ localStorage.setItem(key,value); return true; }
  return new Promise((resolve)=>{
    const tx = db.transaction(STORE,'readwrite');
    tx.objectStore(STORE).put(value,key);
    tx.oncomplete = ()=> resolve(true);
    tx.onerror = ()=> resolve(false);
  });
}

function getToday(dateStr){
  dateStr = dateStr || todayStr();
  if(!dailyLogs[dateStr]){
    dailyLogs[dateStr] = {weight:null, waist:null, water:0, exerciseLog:[], notes:'', meals:[], eatStart:null, eatEnd:null, steps:null, activityLevel:null};
  }
  const t = dailyLogs[dateStr];
  if(t.exerciseLog===undefined) t.exerciseLog = (t.exercise||[]).map(name=>({name,minutes:30}));
  if(t.eatStart===undefined) t.eatStart=null;
  if(t.eatEnd===undefined) t.eatEnd=null;
  if(t.steps===undefined) t.steps=null;
  if(t.activityLevel===undefined) t.activityLevel=null;
  return t;
}
function pastDates(n){
  const list=[];
  for(let i=0;i<n;i++){ const d=new Date(); d.setDate(d.getDate()-i); list.push(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')); }
  return list;
}
function lastEatEnd(){
  const dates = Object.keys(dailyLogs).sort();
  for(let i=dates.length-1;i>=0;i--){ const d=dailyLogs[dates[i]]; if(d && d.eatEnd) return {date:dates[i], time:d.eatEnd}; }
  return null;
}
function fastingStatus(){
  const today = getToday(); const now = new Date();
  if(today.eatStart && !today.eatEnd){ const start=new Date(today.eatStart); return {state:'eating', minutes: Math.round((now-start)/60000)}; }
  const last = lastEatEnd();
  if(!last) return {state:'unknown', hours:0};
  return {state:'fasting', hours:(now-new Date(last.time))/3600000};
}

/* ============ DERIVED DATA ============ */
function currentWeight(){ return weightLog.length===0 ? settings.startWeight : weightLog[weightLog.length-1].weight; }
function currentWaist(){ const w=[...weightLog].reverse().find(e=>e.waist); return w? w.waist : settings.startWaist; }
function streakDays(){
  let n=0, d=new Date();
  while(true){
    const key = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    const log = dailyLogs[key];
    if(log && (log.meals.length>0 || log.weight)){ n++; d.setDate(d.getDate()-1); } else break;
  }
  return n;
}
function mealTotals(meal){
  return (meal||[]).reduce((acc,item)=>{
    const f = allFoods().find(x=>x.id===item.foodId);
    if(!f) return acc;
    const src = item.override || f;
    acc.cal += src.cal*item.qty; acc.protein += src.protein*item.qty;
    acc.carbs += src.carbs*item.qty; acc.fat += src.fat*item.qty; acc.fiber += src.fiber*item.qty;
    return acc;
  },{cal:0,protein:0,carbs:0,fat:0,fiber:0});
}
function foodFrequencyMap(){
  const freq={};
  Object.values(dailyLogs).forEach(day=>{ (day.meals||[]).forEach(m=>{ freq[m.foodId]=(freq[m.foodId]||0)+m.qty; }); });
  return freq;
}
function dynamicMilestones(){
  const start = settings.startWeight, goal = settings.goalWeight;
  if(!(start>goal)) return [goal];
  const step = (start-goal)>=20 ? MILESTONE_STEP_LARGE : MILESTONE_STEP_SMALL;
  let list = []; let m = Math.floor(start/step)*step;
  if(m>=start) m -= step;
  while(m>goal){ list.push(round1(m)); m -= step; }
  list.push(goal);
  return list;
}
function bmrTdee(){
  const w = currentWeight(), h = settings.heightCm, age = settings.age, sex = settings.sex;
  if(!h || !age || !sex) return null;
  let bmr = sex==='male' ? (10*w + 6.25*h - 5*age + 5) : (10*w + 6.25*h - 5*age - 161);
  const level = ACTIVITY_LEVELS.find(a=>a.id===settings.activityMultLevel) || ACTIVITY_LEVELS[1];
  const tdee = bmr * level.mult;
  return {bmr: Math.round(bmr), tdee: Math.round(tdee)};
}

function render(){

  const isTabSwitch = currentTab !== renderedTab;
  const slideClass = isTabSwitch ? ('slide-'+lastSlideDir) : '';

/* ============ TIME / RING HELPERS ============ */
function timeStr(iso){ return new Date(iso).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}); }
function nowClock(){ return new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',second:'2-digit'}); }
function ringSvg(pct, size, color, label, sub, idPrefix){
  const r = size/2-8, c=2*Math.PI*r, cx=size/2, cy=size/2;
  const off = c - clamp(pct,0,1)*c;
  const fgId = idPrefix ? `id="${idPrefix}-fg"` : '';
  const vId = idPrefix ? `id="${idPrefix}-v"` : '';
  return `<div class="ring-wrap" style="width:${size}px;height:${size}px;">
    <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
      <circle class="ring-bg" cx="${cx}" cy="${cy}" r="${r}"/>
      <circle class="ring-fg" ${fgId} cx="${cx}" cy="${cy}" r="${r}" stroke="${color}" stroke-dasharray="${c}" stroke-dashoffset="${off}"/>
    </svg>
    <div class="ring-label"><div class="rv" ${vId}>${label}</div><div class="rl">${sub}</div></div>
  </div>`;
}

    saveUnlockedBadges();
    newly.forEach((b,i)=> setTimeout(()=>showAchievementToast(b), i*2200));
  }
  return badges;

function recentlyUnlockedBadges(n){
  const badges = computeBadges();
  return badges
    .filter(b=> b.unlocked && unlockedBadges[b.label])
    .sort((a,b)=> new Date(unlockedBadges[b.label]) - new Date(unlockedBadges[a.label]))
    .slice(0,n)
    .map(b=> ({...b, when: unlockedBadges[b.label]}));
}
function timeAgo(iso){
  const diff = (Date.now() - new Date(iso).getTime())/1000;
  if(diff<3600) return Math.max(1,Math.round(diff/60))+'m ago';
  if(diff<86400) return Math.round(diff/3600)+'h ago';
  return Math.round(diff/86400)+'d ago';
}

function fireConfetti(){
  const colors = ['#F5C451','#FF7A59','#2FD9A2','#7CF0C6','#FFD87A'];
  const count = 34;
  for(let i=0;i<count;i++){
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    const left = Math.random()*100;
    const color = colors[Math.floor(Math.random()*colors.length)];
    const duration = 1.6 + Math.random()*1.2;
    const rotate = Math.random()*360;
    const drift = (Math.random()-0.5)*160;
    piece.style.left = left+'vw';
    piece.style.background = color;
    piece.style.transform = 'rotate('+rotate+'deg)';
    piece.style.animation = `confettiFall ${duration}s cubic-bezier(.25,.46,.45,.94) forwards`;
    piece.style.setProperty('--drift', drift+'px');
    document.body.appendChild(piece);
    setTimeout(()=> piece.remove(), duration*1000+100);
  }
}

function computeVitals(){
  const w = currentWeight(), h = settings.heightCm, age = settings.age, sex = settings.sex;
  const out = {};
  if(h){ out.bmi = round1(w / ((h/100)**2)); }
  if(h && age && sex){
    const bf = 1.20*out.bmi + 0.23*age - 10.8*(sex==='male'?1:0) - 5.4;
    out.bodyFatPct = round1(Math.max(3, bf));
  }
  const bt = bmrTdee();
  if(bt){
    const today = getToday();
    const todayCal = mealTotals(today.meals).cal;
    out.deficit = Math.round(bt.tdee - todayCal);
  }
  const withWeight = weightLog.filter(e=>e.weight).sort((a,b)=>a.date.localeCompare(b.date));
  if(withWeight.length>=2){
    const first = withWeight[0], last = withWeight[withWeight.length-1];
    const days = (new Date(last.date) - new Date(first.date))/86400000;
    if(days>=3){
      const totalLost = first.weight - last.weight;
      const ratePerWeek = totalLost / (days/7);
      if(ratePerWeek > 0.05){
        const remaining = last.weight - settings.goalWeight;
        if(remaining>0){
          const weeksNeeded = remaining/ratePerWeek;
          const estDate = new Date(); estDate.setDate(estDate.getDate() + Math.round(weeksNeeded*7));
          out.estGoalDate = estDate.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
          out.weeklyRate = round1(ratePerWeek);
        }
      }
    }
  }
  return out;
}

function milestoneTrackHtml(cw){
  const ms = dynamicMilestones();
  const start = settings.startWeight, goal = settings.goalWeight;
  const span = start-goal || 1;
  const progressPct = clamp((start-cw)/span*100,0,100);
  const ticks = ms.map(m=>{
    const pct = clamp((start-m)/span*100,0,100);
    return `<div class="tickmark" style="left:${pct}%"></div><div class="tick" style="left:${pct}%">${m}</div>`;
  }).join('');
  return `<div class="milestone-track">
    <div class="fill" style="width:${progressPct}%"></div>
    ${ticks}
    <div class="dot" style="left:${progressPct}%"></div>
  </div>

}

/* ============ MENU ============ */
function eligiblePool(){
  const wknd = isWeekend(todayStr());
  return allFoods().filter(f=>{
    if(f.beverage || f.cal<15 || f.dessert) return false;
    if(f.tags.includes('chicken')) return menuFilters.chicken && wknd;
    if(f.tags.includes('fish')) return menuFilters.fish;
    if(f.tags.includes('egg')) return menuFilters.egg;
    if(f.tags.includes('tofu')) return menuFilters.tofu;
    if(!menuFilters.veg) return false;
    if(menuFilters.region!=='any' && f.region!=='both' && f.region!==menuFilters.region) return false;
    return true;
  });
}
function getMaxQty(food, calorieTarget){
  const smallServings = ['egg','eggwhite','roastedchana','roastedmoong','peanuts','idli','roti','dosa','cucumber','apple','guava','banana','orange','walnuts','almonds','cashews','pumpkinseeds','sunflowerseeds','pomegranate','watermelon','papaya','buttermilk'];
  let base = smallServings.includes(food.id) ? 3 : 2;
  const cal = calorieTarget || settings.calorieTarget;
  if(cal >= 2000) base += 1;
  if(cal >= 2800) base += 1;
  return base;
}
const MAX_MENU_ITEMS = 10;
const ANCHOR_FOODS = ['peanuts','roastedchana','curd','whey'];

/* ============ MENU GENERATION ALGORITHM ============
   Greedy multi-nutrient knapsack: at each step, scores every remaining
   eligible food by how efficiently it closes the *current* gaps toward
   calorie/protein/carbs/fiber targets (nutrient-per-calorie, weighted by
   how much of each target is still unmet), then takes the best-scoring
   food at a realistic quantity. Repeats until targets are close, the
   calorie ceiling is reached, or no viable food remains. This directly
   optimizes toward the plan's numbers instead of picking food first and
   hoping the numbers work out. */
function generateMenu(){
  const pool = eligiblePool();
  if(pool.length===0){ showToast('No foods match your filters'); return; }
  const freq = foodFrequencyMap();
  let combo=[], cal=0, protein=0, carbs=0, fiber=0, usedIds=[];
  const usedTags = new Set();
  const markTags = (f)=> f.tags.forEach(t=>{ if(t!=='veg') usedTags.add(t); });

  ANCHOR_FOODS.forEach(id=>{
    if(!menuFilters.anchors[id]) return;
    const f = FOODS.find(x=>x.id===id);
    if(f){ combo.push({foodId:id,qty:1}); cal+=f.cal; protein+=f.protein; carbs+=f.carbs; fiber+=f.fiber; usedIds.push(id); markTags(f); }
  });

  const targets = {
    cal: settings.calorieTarget,
    protein: settings.proteinTarget,
    carbs: settings.carbsTarget,
    fiber: settings.fiberTarget,
  };

  let guard = 0, rejected = [];
  while(combo.length < MAX_MENU_ITEMS && guard < 26){
    guard++;
    const calRemaining = targets.cal - cal;
    if(calRemaining < targets.cal*0.03) break;

    const proteinGap = Math.max(0, targets.protein - protein);
    const carbsGap = Math.max(0, targets.carbs - carbs);
    const fiberGap = Math.max(0, targets.fiber - fiber);
    const closeEnough = proteinGap < targets.protein*0.06 && carbsGap < targets.carbs*0.12 &&
                         fiberGap < targets.fiber*0.15 && cal >= targets.cal*0.92;
    if(closeEnough) break;

    const excludeSet = [...usedIds, ...rejected];
    const candidates = pool.filter(f=>
      !excludeSet.includes(f.id) &&
      !f.tags.some(t=> t!=='veg' && usedTags.has(t)) &&
      f.cal <= Math.max(calRemaining*1.3, 60)
    );
    if(candidates.length===0) break;

    let best=null, bestScore=-Infinity;
    candidates.forEach(f=>{
      const proteinScore = proteinGap>0 ? Math.min(f.protein,proteinGap)/proteinGap : 0;
      const carbsScore = carbsGap>0 ? Math.min(f.carbs,carbsGap)/carbsGap : 0;
      const fiberScore = fiberGap>0 ? Math.min(f.fiber,fiberGap)/fiberGap : 0;
      const nutrientScore = proteinScore*1.2 + carbsScore*0.9 + fiberScore*1.3;
      const perCal = nutrientScore / Math.max(f.cal,1) * 100;
      const freqBonus = (freq[f.id]||0) > 0 ? 0.2 : 0;
      const score = perCal + freqBonus;
      if(score>bestScore){ bestScore=score; best=f; }
    });
    if(!best) break;

    if(cal+best.cal > targets.cal*1.08){ rejected.push(best.id); continue; }
    const maxQ = getMaxQty(best, targets.cal);
    let qty = 1;
    while(qty<maxQ && cal+best.cal*(qty+1) <= targets.cal*1.05) qty++;

    combo.push({foodId:best.id, qty}); cal+=best.cal*qty; protein+=best.protein*qty; carbs+=best.carbs*qty; fiber+=best.fiber*qty;
    usedIds.push(best.id); markTags(best);
  }

  // TOP-UP — if the 10-item cap was hit before targets were reasonably met, increase
  // portions of already-chosen foods (larger realistic servings) rather than stopping
  // short, since a real plate can have bigger portions even with a fixed dish count.
  let topUpGuard = 0;
  while(cal < targets.cal*0.9 && topUpGuard < 12){
    topUpGuard++;
    const proteinGap = Math.max(0, targets.protein - protein);
    const carbsGap = Math.max(0, targets.carbs - carbs);
    const fiberGap = Math.max(0, targets.fiber - fiber);
    let bestIdx=-1, bestScore=-Infinity;
    combo.forEach((item,idx)=>{
      const f = allFoods().find(x=>x.id===item.foodId);
      if(!f) return;
      const hardCap = getMaxQty(f, targets.cal) + 2; // small top-up allowance beyond the normal realistic cap
      if(item.qty >= hardCap) return;
      if(cal + f.cal > targets.cal*1.06) return;
      const proteinScore = proteinGap>0 ? Math.min(f.protein,proteinGap)/proteinGap : 0;
      const carbsScore = carbsGap>0 ? Math.min(f.carbs,carbsGap)/carbsGap : 0;
      const fiberScore = fiberGap>0 ? Math.min(f.fiber,fiberGap)/fiberGap : 0;
      const score = (proteinScore*1.2 + carbsScore*0.9 + fiberScore*1.3) / Math.max(f.cal,1) * 100;
      if(score>bestScore){ bestScore=score; bestIdx=idx; }
    });
    if(bestIdx===-1) break;
    const f = allFoods().find(x=>x.id===combo[bestIdx].foodId);
    combo[bestIdx].qty += 1;
    cal += f.cal; protein += f.protein; carbs += f.carbs; fiber += f.fiber;
  }

  lastMenu = combo; lastMenuTotals = {cal, protein, carbs, fiber};
  render();
}

function proteinReferenceWeight(){
  // Using raw current bodyweight for protein/fat math overstates need when someone is
  // well above their goal weight (most of that gap is fat mass, not lean tissue that
  // needs feeding). Blend 40% of the way from goal weight toward current weight instead —
  // a simple, defensible stand-in for lean mass using data we already have.
  const cw = currentWeight();
  const goal = settings.goalWeight || cw;
  return goal + 0.4*(cw-goal);
}
function deriveCarbsFiber(cal, proteinG, weightKg){
  const fatG = Math.round(weightKg*0.8); // minimum fat allocation for hormonal/health baseline
  const remainingCal = Math.max(0, cal - proteinG*4 - fatG*9);
  const carbs = Math.max(50, Math.round(remainingCal/4));
  const fiber = Math.round(cal/1000*14); // ~14g fiber per 1000kcal, standard population guideline
  return {carbs, fiber};
}
function computeGoalTargets(){
  const bt = bmrTdee();
  if(!bt) return null;
  const refW = proteinReferenceWeight();
  let rawCal;
  if(settings.goalType==='lose') rawCal = bt.tdee - (settings.goalRateKgPerWeek*7700/7);
  else if(settings.goalType==='gain') rawCal = bt.tdee + (settings.goalRateKgPerWeek*7700/7);
  else rawCal = bt.tdee;
  // Safety floor: never suggest going below ~90% of BMR (a widely used lower bound for
  // very-low-calorie approaches) or 1200 kcal, whichever is higher — going lower than
  // this is generally only done under medical supervision.
  const floor = Math.max(1200, Math.round(bt.bmr*0.9));
  let cal = Math.round(rawCal/10)*10;
  const wasCapped = settings.goalType==='lose' && cal < floor;
  if(wasCapped) cal = floor;
  const proteinPerKg = settings.goalType==='lose' ? 1.8 : settings.goalType==='gain' ? 2.0 : 1.6;
  const protein = Math.round(refW*proteinPerKg);
  const {carbs, fiber} = deriveCarbsFiber(cal, protein, refW);
  const achievedRate = settings.goalType==='lose' ? round1((bt.tdee-cal)*7/7700) : settings.goalType==='gain' ? round1((cal-bt.tdee)*7/7700) : 0;
  return {cal, protein, carbs, fiber, tdee:bt.tdee, wasCapped, achievedRate};
}

/* ============ SEARCH ============ */
function searchFoods(query, list){
  if(!query) return list;
  const q = query.toLowerCase();
  const starts = list.filter(f=>f.name.toLowerCase().startsWith(q));
  const contains = list.filter(f=>!f.name.toLowerCase().startsWith(q) && f.name.toLowerCase().includes(q));
  return [...starts, ...contains];
}

  const today = getToday(selectedLogDate);

function persistWeightWaist(dateStr, w, wa){
  const today = getToday(dateStr);
  if(w){
    today.weight = parseFloat(w);
    const idx = weightLog.findIndex(e=>e.date===dateStr);
    const entry = {date:dateStr, weight:parseFloat(w), waist: wa?parseFloat(wa):(weightLog[idx]?.waist||null)};
    if(idx>=0) weightLog[idx]=entry; else weightLog.push(entry);
  } else if(wa){
    today.waist = parseFloat(wa);
    const idx = weightLog.findIndex(e=>e.date===dateStr);
    if(idx>=0) weightLog[idx].waist = parseFloat(wa);
    else weightLog.push({date:dateStr, weight:null, waist:parseFloat(wa)});
  }
  weightLog.sort((a,b)=>a.date.localeCompare(b.date));
}

/* ============ PROGRESS ============ */
function niceStep(range){
  const rough = range/4;
  const mag = Math.pow(10, Math.floor(Math.log10(rough||1)));
  const norm = rough/mag;
  const step = norm<1.5 ? 1 : norm<3 ? 2 : norm<7 ? 5 : 10;
  return step*mag;
}
function lineChartSvg(points, color, unitSuffix, axisTitle){
  if(points.length<2) return `<div class="empty">Log a couple more entries to see this trend.</div>`;
  const w=320, h=190, padL=38, padR=14, padT=14, padB=30;
  const plotW=w-padL-padR, plotH=h-padT-padB;
  const vals=points.map(p=>p.v);
  const rawMin=Math.min(...vals), rawMax=Math.max(...vals);
  const step = niceStep(rawMax-rawMin || 1);
  const minV = Math.floor((rawMin-step*0.3)/step)*step;
  const maxV = Math.ceil((rawMax+step*0.3)/step)*step;
  const range = (maxV-minV)||1;

  const xAt = i => padL + (i/(points.length-1))*plotW;
  const yAt = v => padT + plotH - ((v-minV)/range)*plotH;

  const pts = points.map((p,i)=>[xAt(i), yAt(p.v)]);
  const path = pts.map((p,i)=>(i===0?'M':'L')+p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
  const areaPath = path + ` L${pts[pts.length-1][0].toFixed(1)},${(padT+plotH).toFixed(1)} L${pts[0][0].toFixed(1)},${(padT+plotH).toFixed(1)} Z`;
  const dots = pts.map(p=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="3.2" fill="${color}" stroke="rgba(255,255,255,0.6)" stroke-width="1"/>`).join('');

  let gridLines = '', yLabels = '';
  const numTicks = Math.round(range/step);
  for(let i=0;i<=numTicks;i++){
    const v = minV + i*step;
    const y = yAt(v);
    gridLines += `<line class="grid-line" x1="${padL}" y1="${y.toFixed(1)}" x2="${w-padR}" y2="${y.toFixed(1)}"/>`;
    yLabels += `<text class="axis-label" x="${padL-6}" y="${(y+3).toFixed(1)}" text-anchor="end">${Math.round(v*10)/10}</text>`;
  }
  const firstDate = points[0].date, midDate = points[Math.floor((points.length-1)/2)].date, lastDate = points[points.length-1].date;
  const xLabels = (points[0].date) ? `
    <text class="axis-label" x="${padL}" y="${h-8}" text-anchor="start">${fmtDate(firstDate)}</text>
    <text class="axis-label" x="${(padL+w-padR)/2}" y="${h-8}" text-anchor="middle">${fmtDate(midDate)}</text>
    <text class="axis-label" x="${w-padR}" y="${h-8}" text-anchor="end">${fmtDate(lastDate)}</text>
  ` : '';

  return `<svg class="chart" viewBox="0 0 ${w} ${h}">
    ${gridLines}
    <text class="axis-title" x="${padL}" y="10">${axisTitle||''}</text>
    ${yLabels}
    <path d="${areaPath}" fill="${color}" opacity="0.12" stroke="none"/>
    <path d="${path}" fill="none" stroke="${color}" stroke-width="2.4"/>
    ${dots}
    ${xLabels}
  </svg>`;
}
function barChartSvg(points, color, unit, axisTitle){
  if(points.length===0) return `<div class="empty">No entries yet.</div>`;
  const w=320, h=170, padL=38, padR=14, padT=14, padB=26;
  const plotW=w-padL-padR, plotH=h-padT-padB;
  const vals=points.map(p=>p.v); const maxV=Math.max(...vals,1);
  const step = niceStep(maxV);
  const axisMax = Math.ceil(maxV/step)*step || step;
  const gap=6;
  const bw=plotW/points.length-gap;

  let gridLines='', yLabels='';
  const numTicks = Math.round(axisMax/step);
  for(let i=0;i<=numTicks;i++){
    const v = i*step;
    const y = padT+plotH-(v/axisMax)*plotH;
    gridLines += `<line class="grid-line" x1="${padL}" y1="${y.toFixed(1)}" x2="${w-padR}" y2="${y.toFixed(1)}"/>`;
    yLabels += `<text class="axis-label" x="${padL-6}" y="${(y+3).toFixed(1)}" text-anchor="end">${v}</text>`;
  }
  const bars = points.map((p,i)=>{
    const bh=(p.v/axisMax)*plotH; const x=padL+i*(plotW/points.length); const y=padT+plotH-bh;
    return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${bh.toFixed(1)}" rx="3" fill="${color}"/>`;
  }).join('');
  const firstDate = points[0].date, lastDate = points[points.length-1].date;
  const xLabels = firstDate ? `
    <text class="axis-label" x="${padL}" y="${h-6}" text-anchor="start">${fmtDate(firstDate)}</text>
    <text class="axis-label" x="${w-padR}" y="${h-6}" text-anchor="end">${fmtDate(lastDate)}</text>` : '';
  return `<svg class="chart" viewBox="0 0 ${w} ${h}">
    ${gridLines}
    <text class="axis-title" x="${padL}" y="10">${axisTitle||''}</text>
    ${yLabels}${bars}${xLabels}
  </svg>
  <div class="row small" style="margin-top:4px;"><span>Avg ${Math.round(vals.reduce((a,b)=>a+b,0)/vals.length)} ${unit}</span><span>Best ${maxV} ${unit}</span></div>`;
}
function isoWeekKey(dateStr){
  const d = new Date(dateStr+'T00:00:00');
  const day = (d.getDay()+6)%7; // Monday=0
  d.setDate(d.getDate()-day);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function weeklyAverages(entries, field){
  const buckets = {};
  entries.forEach(e=>{
    if(e[field]==null) return;
    const wk = isoWeekKey(e.date);
    if(!buckets[wk]) buckets[wk] = [];
    buckets[wk].push(e[field]);
  });
  return Object.keys(buckets).sort().map(wk=>({
    weekStart: wk,
    avg: round1(buckets[wk].reduce((a,b)=>a+b,0)/buckets[wk].length),
    count: buckets[wk].length
  }));
}
function weeklyAveragesHtml(entries, field, unit){
  const weeks = weeklyAverages(entries, field);
  if(weeks.length===0) return `<div class="empty">No data yet.</div>`;
  return weeks.slice(-3).reverse().map((wk,i,arr)=>{
    const prev = arr[i+1];
    let arrow = '';
    if(prev){
      const diff = round1(wk.avg-prev.avg);
      arrow = diff<0 ? `<span class="wk-arrow down">▾ ${Math.abs(diff)}</span>` : diff>0 ? `<span class="wk-arrow up">▴ ${diff}</span>` : `<span class="wk-arrow">–</span>`;
    }
    return `<div class="weekly-row"><span>Week of ${fmtDate(wk.weekStart)}</span><span class="num">${wk.avg}${unit} ${arrow}</span></div>`;
  }).join('');
}

function clearEntrySearchDate(){ entrySearchDate = null; render(); }
function renderProgress(){
  const cw = currentWeight();
  const weightEntries = weightLog.filter(e=>e.weight);
  const waistEntries = weightLog.filter(e=>e.waist);
  const weightPts = weightEntries.map(e=>({v:e.weight, date:e.date}));
  const waistPts = waistEntries.map(e=>({v:e.waist, date:e.date}));
  const fatPts = weightEntries.map(e=>({v:estFatLossKg(e.weight), date:e.date}));
  const stepsDates = Object.keys(dailyLogs).sort().slice(-14).filter(d=>dailyLogs[d].steps);
  const stepsPts = stepsDates.map(d=>({v:dailyLogs[d].steps, date:d}));
  const badges = computeBadges();

  const searchedDate = entrySearchDate ? weightLog.find(e=>e.date===entrySearchDate) : null;
  const entriesToShow = entrySearchDate
    ? (searchedDate ? [searchedDate] : [])
    : [...weightLog].reverse().slice(0,10);

  return `
  <div class="card"><div class="card-label">Weight trend</div>${lineChartSvg(weightPts,'var(--gold)','','Weight (kg)')}</div>
  <div class="card"><div class="card-label">Weekly average weight — last 3 weeks</div>${weeklyAveragesHtml(weightEntries,'weight','kg')}</div>
  <div class="card"><div class="card-label">Waist trend</div>${lineChartSvg(waistPts,'var(--sage)','','Waist (cm)')}</div>
  ${waistEntries.length ? `<div class="card"><div class="card-label">Weekly average waist — last 3 weeks</div>${weeklyAveragesHtml(waistEntries,'waist','cm')}</div>` : ''}
  <div class="card"><div class="card-label">Estimated fat lost</div>${lineChartSvg(fatPts,'var(--rust)','','Fat lost (kg)')}
    <div class="small" style="margin-top:6px;">Rough estimate assuming about 85% of weight lost is fat — not a clinical measurement.</div></div>
  <div class="card"><div class="card-label">Steps — last 14 logged days</div>${barChartSvg(stepsPts,'var(--sage)','steps','Steps')}</div>
  <div class="card"><div class="card-label">Milestones</div>${milestoneTrackHtml(cw)}
    <div class="stamp-grid" style="margin-top:14px;">${dynamicMilestones().map(m=>`<div class="stamp ${cw<=m?'unlocked':'locked'}">${m}<div class="sl">kg</div></div>`).join('')}</div></div>
  <div class="card"><div class="card-label">Rewards</div>
    <div class="stamp-grid">${badges.map(b=>`<div class="stamp ${b.unlocked?'unlocked':'locked'}" title="${b.label}">${b.icon}<div class="sl">${b.label}</div></div>`).join('')}</div></div>
  <div class="card">
    <div class="card-label">Entries</div>
    <input type="date" id="entry-search-input" value="${entrySearchDate||''}" onchange="setEntrySearchDate(this.value)" style="margin-bottom:10px;">
    ${entrySearchDate ? `<button class="btn ghost sm" onclick="clearEntrySearchDate()" style="margin-bottom:10px;">Clear search — show recent</button>` : ''}
    ${entriesToShow.length===0 ? `<div class="empty">${entrySearchDate ? 'No entry saved for that date.' : 'No entries yet.'}</div>` :
      entriesToShow.map(e=>`
      <div class="food-item"><div class="fi-name">${fmtDate(e.date)}</div><div class="fi-sub num">${e.weight?e.weight+' kg':'—'} ${e.waist?' · '+e.waist+' cm':''}</div></div>`).join('')}
    ${!entrySearchDate && weightLog.length>10 ? `<div class="small" style="margin-top:8px;">Showing your 10 most recent entries. All ${weightLog.length} entries are saved — search a date above to find an older one.</div>` : ''}
  </div>`;
}

/* ============ SETTINGS (PLAN) ============ */
function renderSettings(){
  return `
  <div class="card" id="install-card">
    <div class="card-label">Install</div>
    ${deferredPrompt ? `
      <div class="small" style="margin-bottom:8px;">Install Nutrition Ledger as a standalone app on this device.</div>
      <button class="btn accent block" onclick="triggerInstall()">Install app</button>
    ` : `
      <div class="small" style="margin-bottom:8px;">Add Nutrition Ledger to your home screen for one-tap, full-screen access.</div>
      <button class="btn accent block" onclick="showInstallHelp=!showInstallHelp; render();">${showInstallHelp?'Hide instructions':'How do I install it?'}</button>
      ${showInstallHelp ? `<div class="note">
        <b style="color:var(--ink);">Android (Chrome):</b> tap ⋮ in the top right → "Install app" or "Add to Home screen".<br><br>
        <b style="color:var(--ink);">iPhone (Safari):</b> tap the Share icon → "Add to Home Screen".<br><br>
        Once installed it opens full-screen with its own icon, and works offline.
      </div>` : ''}
    `}
  </div>
  <div class="card">
    <div class="card-label">Your plan</div>
    ${!settings.initialized ? '<div class="warn">Fill in the fields below and save — this unlocks Menu, Today, Foods and Progress.</div>' : ''}
    <label class="field-label">Height (cm)</label><input type="number" id="s-height" value="${settings.heightCm||''}">
    <label class="field-label">Age (years)</label><input type="number" id="s-age" value="${settings.age||''}">
    <label class="field-label">Sex (for calorie estimate)</label>
    <div class="chip-row"><div class="chip ${settings.sex==='male'?'active':''}" onclick="setSex('male')">Male</div><div class="chip ${settings.sex==='female'?'active':''}" onclick="setSex('female')">Female</div></div>
    <label class="field-label">Starting weight (kg)</label><input type="number" step="0.1" id="s-startweight" value="${settings.startWeight}">
    <label class="field-label">Starting waist (cm)</label><input type="number" step="0.5" id="s-startwaist" value="${settings.startWaist}">
    <label class="field-label">Goal weight (kg)</label><input type="number" step="0.5" id="s-goalweight" value="${settings.goalWeight}">
    <label class="field-label">Daily water goal (L)</label><input type="number" step="0.5" id="s-water" value="${settings.waterGoalL}">
    <label class="field-label">Target eating window (hours)</label><input type="number" step="0.5" id="s-eatwindow" value="${settings.targetEatingWindowHrs}">
    <label class="field-label">Daily step goal</label><input type="number" step="500" id="s-steps" value="${settings.stepGoal}">
    <button class="btn accent block" style="margin-top:12px;" onclick="saveSettingsForm()">Save plan</button>
  </div>
  ${calorieProteinEstimateHtml()}
  <div class="card"><div class="card-label">About this ledger</div>
    <div class="small" style="line-height:1.6;">Everything you log stays only on this device (this browser), offline-capable once loaded. Add this page to your home screen for one-tap access.</div></div>
  `;
}
function setSex(s){ settings.sex = settings.sex===s?null:s; render(); }
function setActivityMult(id){ settings.activityMultLevel = id; render(); }
function saveSettingsForm(){
  settings.heightCm = parseFloat(document.getElementById('s-height').value)||settings.heightCm;
  settings.age = parseInt(document.getElementById('s-age').value)||settings.age;
  settings.startWeight = parseFloat(document.getElementById('s-startweight').value)||settings.startWeight;
  settings.startWaist = parseFloat(document.getElementById('s-startwaist').value)||settings.startWaist;
  settings.goalWeight = parseFloat(document.getElementById('s-goalweight').value)||settings.goalWeight;
  settings.waterGoalL = parseFloat(document.getElementById('s-water').value)||settings.waterGoalL;
  settings.targetEatingWindowHrs = parseFloat(document.getElementById('s-eatwindow').value)||settings.targetEatingWindowHrs;
  settings.stepGoal = parseInt(document.getElementById('s-steps').value)||settings.stepGoal;
  if(settings.heightCm && settings.age && settings.sex && settings.startWeight && settings.goalWeight){ settings.initialized = true; }
  saveSettings(); showToast(settings.initialized ? 'Plan saved — app unlocked' : 'Plan saved — add height, age and sex to unlock the app');
  render();
}

/* ============ SWIPE NAVIGATION (circular — wraps between Progress and Home) ============ */
let touchStartX=0, touchStartY=0;
document.addEventListener('touchstart', (e)=>{
  touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY;
}, {passive:true});
document.addEventListener('touchend', (e)=>{
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if(Math.abs(dx) > 70 && Math.abs(dx) > Math.abs(dy)*1.6){
    const idx = tabOrder.indexOf(currentTab);
    const n = tabOrder.length;
    if(dx < 0) switchTab(tabOrder[(idx+1)%n]);
    else if(dx > 0) switchTab(tabOrder[(idx-1+n)%n]);
  }
}, {passive:true});

/* ============ SMOOTH LIVE TICK (no full re-render) ============ */
function liveTick(){
  if(currentTab!=='home' && currentTab!=='today') return;
  document.querySelectorAll('.now-clock').forEach(el=>{ el.textContent = 'Now: ' + nowClock(); });
  const status = fastingStatus();
  const fg = document.getElementById('fast-ring-fg'), vLabel = document.getElementById('fast-ring-v');
  if(fg && vLabel){
    const targetFastHrs = 24 - settings.targetEatingWindowHrs;
    let pct, label;
    if(status.state==='eating'){
      pct = status.minutes/(settings.targetEatingWindowHrs*60);
      const h=Math.floor(status.minutes/60), m=status.minutes%60;
      label = (h>0?h+'h ':'')+m+'m';
    } else if(status.state==='fasting'){
      pct = status.hours/targetFastHrs;
      const h=Math.floor(status.hours), m=Math.round((status.hours-h)*60);
      label = h+'h '+m+'m';
    }
    if(pct!=null){
      const r = parseFloat(fg.getAttribute('r')); const c = 2*Math.PI*r;
      fg.setAttribute('stroke-dashoffset', c - clamp(pct,0,1)*c);
      vLabel.textContent = label;
    }
  }
}
setInterval(liveTick, 1000);


document.querySelectorAll('nav.tabbar button').forEach(b=>{ b.addEventListener('click', ()=>switchTab(b.dataset.tab)); });
document.getElementById('theme-toggle').addEventListener('click', ()=>{
  settings.darkMode = !settings.darkMode;
  document.documentElement.setAttribute('data-theme', settings.darkMode?'dark':'light');
  saveSettings();
});

let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', (e)=>{
  e.preventDefault(); deferredPrompt=e;
  const hb = document.getElementById('header-install-btn'); if(hb) hb.style.display='flex';
  if(currentTab==='settings') render();
});
async function triggerInstall(){
  if(!deferredPrompt) return;
  deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt=null;
  const hb = document.getElementById('header-install-btn'); if(hb) hb.style.display='none';
  render();
}
window.addEventListener('appinstalled', ()=>{
  const hb = document.getElementById('header-install-btn'); if(hb) hb.style.display='none';
  showToast('Installed! Find it on your home screen.');
});

(async function init(){
  await loadAll();
  document.documentElement.setAttribute('data-theme', settings.darkMode?'dark':'light');
  render();
  setInterval(()=>{ if(currentTab==='home' || currentTab==='today') render(); }, 300000);
})();

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{ navigator.serviceWorker.register('sw.js').catch(()=>{}); });
}
</script>
</body>
</html>
